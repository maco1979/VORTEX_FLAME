<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>知识库管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080808;--bg2:#121212;--bg3:#1a1a1a;--bg4:#242424;--bg5:#2e2e2e;
  --tx:#f0f0f0;--tx2:#c0c0c0;--tx3:#808080;--tx4:#505050;
  --ac:#c8a951;--ac2:#a68a3e;--ok:#6b8;--warn:#da8;--err:#c66;--info:#68b;
  --ff:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --ffs:'Noto Serif SC','STSong','SimSun',serif;
  --ffm:'JetBrains Mono',ui-monospace,monospace;
  --r:6px;--rl:10px;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--ff);font-size:14px;line-height:1.6;color:var(--tx2)}

.app{display:flex;height:100vh;max-width:1400px;margin:0 auto}

/* nav */
.nav{width:180px;background:var(--bg2);border-right:1px solid var(--bg4);display:flex;flex-direction:column;flex-shrink:0}
.nav-header{padding:16px;border-bottom:1px solid var(--bg4)}
.nav-logo{font-family:var(--ffs);font-size:15px;color:var(--ac);display:flex;align-items:center;gap:8px}
.nav-logo-icon{width:24px;height:24px;border:1px solid var(--ac);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.nav-menu{padding:8px 0;flex:1}
.nav-item{padding:10px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--tx3);font-size:13px;transition:all .1s;border-left:2px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--tx)}
.nav-item.active{background:var(--bg3);color:var(--ac);border-left-color:var(--ac)}
.nav-item svg{width:14px;height:14px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;padding:1px 6px;background:rgba(200,169,81,.15);color:var(--ac);border-radius:8px}
.nav-footer{padding:12px 16px;border-top:1px solid var(--bg4);font-size:11px;color:var(--tx4)}

/* main */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.main-header{padding:16px 24px;border-bottom:1px solid var(--bg4);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.main-title{font-family:var(--ffs);font-size:18px;color:var(--tx);font-weight:400}
.main-actions{display:flex;gap:8px}
.btn{padding:7px 16px;border-radius:var(--r);font-size:13px;cursor:pointer;border:none;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:var(--ac);color:var(--bg)}
.btn-primary:hover{background:var(--ac2)}
.btn-secondary{background:var(--bg3);color:var(--tx2);border:1px solid var(--bg4)}
.btn-secondary:hover{background:var(--bg4)}
.btn-ghost{background:transparent;color:var(--tx3)}
.btn-ghost:hover{background:var(--bg3);color:var(--tx)}
.btn svg{width:14px;height:14px;flex-shrink:0}

.main-content{flex:1;overflow-y:auto;padding:24px}
.main-content::-webkit-scrollbar{width:4px}
.main-content::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}

/* stats row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--rl);padding:16px;display:flex;flex-direction:column;gap:4px}
.stat-label{font-size:11px;color:var(--tx4);text-transform:uppercase;letter-spacing:.04em}
.stat-value{font-size:24px;font-family:var(--ffm);font-weight:500;color:var(--tx)}
.stat-sub{font-size:11px;color:var(--tx4)}

/* upload zone */
.upload-zone{border:2px dashed var(--bg4);border-radius:var(--rl);padding:40px;text-align:center;margin-bottom:24px;transition:all .2s;cursor:pointer;background:var(--bg2)}
.upload-zone.drag-over{border-color:var(--ac);background:rgba(200,169,81,.05)}
.upload-zone-icon{font-size:32px;color:var(--tx4);margin-bottom:12px}
.upload-zone-title{font-size:15px;color:var(--tx2);margin-bottom:4px}
.upload-zone-sub{font-size:12px;color:var(--tx4)}
.upload-zone-types{display:flex;gap:6px;justify-content:center;margin-top:12px}
.upload-type-badge{padding:3px 10px;background:var(--bg3);border:1px solid var(--bg4);border-radius:12px;font-size:11px;color:var(--tx3)}

/* file list */
.section-title{font-size:12px;color:var(--tx4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--bg4)}

.file-list{display:flex;flex-direction:column;gap:4px;margin-bottom:24px}
.file-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--r);transition:all .1s}
.file-item:hover{border-color:var(--bg5)}
.file-item-icon{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.file-item-icon.doc{background:rgba(104,136,255,.1);color:#68f}
.file-item-icon.pdf{background:rgba(255,104,104,.1);color:#f66}
.file-item-icon.txt{background:rgba(104,200,104,.1);color:#6c6}
.file-item-icon.md{background:rgba(255,200,104,.1);color:#fc6}
.file-item-info{flex:1;min-width:0}
.file-item-name{font-size:13px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item-meta{font-size:11px;color:var(--tx4);display:flex;gap:12px;margin-top:2px}
.file-item-status{display:flex;align-items:center;gap:6px;flex-shrink:0}
.status-ready{color:var(--ok)}
.status-processing{color:var(--ac)}
.status-error{color:var(--err)}
.status-pending{color:var(--tx4)}
.file-item-actions{display:flex;gap:4px}
.file-item-btn{width:28px;height:28px;border-radius:var(--r);background:transparent;border:none;color:var(--tx3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.file-item-btn:hover{background:var(--bg4);color:var(--tx)}
.file-item-btn.danger:hover{background:rgba(255,100,100,.1);color:var(--err)}

.progress-bar{width:120px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}

/* search test */
.search-box{display:flex;gap:8px;margin-bottom:16px}
.search-input{flex:1;padding:8px 14px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--r);color:var(--tx);font-size:14px;font-family:var(--ff)}
.search-input:focus{outline:none;border-color:var(--ac)}
.search-input::placeholder{color:var(--tx4)}
.search-results{display:flex;flex-direction:column;gap:4px}
.search-result{padding:12px 16px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--r)}
.search-result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.search-result-source{font-size:11px;color:var(--ac)}
.search-result-score{font-size:10px;color:var(--tx4);font-family:var(--ffm)}
.search-result-text{font-size:13px;color:var(--tx2);line-height:1.6}

/* quality table */
.quality-table{width:100%;border-collapse:collapse;font-size:13px}
.quality-table th{padding:8px 12px;text-align:left;font-size:10px;color:var(--tx4);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--bg4)}
.quality-table td{padding:10px 12px;border-bottom:1px solid var(--bg3);color:var(--tx2)}
.quality-table tr:hover td{background:var(--bg2)}
.quality-badge{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500}
.quality-badge.grade-a{background:rgba(104,200,104,.15);color:var(--ok)}
.quality-badge.grade-b{background:rgba(104,200,168,.15);color:#6c8}
.quality-badge.grade-c{background:rgba(200,169,81,.15);color:var(--ac)}
.quality-badge.grade-d{background:rgba(255,150,100,.15);color:var(--warn)}

/* empty */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--tx4);gap:8px}
.empty-state-icon{font-size:36px;opacity:.3}

/* toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bg4);padding:10px 20px;border-radius:20px;font-size:13px;color:var(--tx);z-index:200;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;top:30px}
.toast.error{border-color:var(--err)}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--rl);width:500px;max-width:90vw;padding:24px}
.modal h2{font-family:var(--ffs);font-size:18px;color:var(--ac);margin-bottom:16px;font-weight:400}
.modal label{display:block;font-size:11px;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.modal input{width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--r);color:var(--tx);font-size:13px;margin-bottom:12px;font-family:var(--ffm)}
.modal input:focus{outline:none;border-color:var(--ac)}
.modal-buttons{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-buttons button{padding:8px 20px;border-radius:var(--r);font-size:13px;cursor:pointer;border:none;transition:all .15s}

/* mobile */
@media(max-width:768px){
  .nav{display:none}
  .stats{grid-template-columns:repeat(2,1fr)}
  .main-content{padding:16px}
}
</style>
</head>
<body>

<div class="app">
  <nav class="nav">
    <div class="nav-header">
      <div class="nav-logo">
        <span class="nav-logo-icon">&#9830;</span>
        <span>知识库</span>
      </div>
    </div>
    <div class="nav-menu">
      <div class="nav-item active" data-page="upload" onclick="switchPage('upload')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        文档上传
        <span class="nav-badge" id="uploadCount">0</span>
      </div>
      <div class="nav-item" data-page="search" onclick="switchPage('search')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        知识检索
      </div>
      <div class="nav-item" data-page="quality" onclick="switchPage('quality')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
        质量报告
      </div>
      <div class="nav-item" data-page="settings" onclick="switchPage('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        设置
      </div>
    </div>
    <div class="nav-footer" id="apiStatus">未连接API</div>
  </nav>

  <div class="main">
    <div class="main-header">
      <span class="main-title" id="pageTitle">文档上传</span>
      <div class="main-actions">
        <button class="btn btn-ghost" onclick="refreshFiles()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M1 20v-6a9 9 0 0115.36-6.36L23 14"/></svg>
          刷新
        </button>
        <button class="btn btn-primary" onclick="openApiSettings()">API设置</button>
      </div>
    </div>

    <div class="main-content" id="mainContent">
      <!-- upload page -->
      <div id="page-upload" class="page">
        <div class="stats">
          <div class="stat-card">
            <span class="stat-label">文档总数</span>
            <span class="stat-value" id="statTotal">0</span>
            <span class="stat-sub">已入库</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">知识片段</span>
            <span class="stat-value" id="statChunks">0</span>
            <span class="stat-sub">可分块检索</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">向量维度</span>
            <span class="stat-value">768</span>
            <span class="stat-sub">embedding模型</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">存储大小</span>
            <span class="stat-value" id="statSize">0MB</span>
            <span class="stat-sub">本地</span>
          </div>
        </div>

        <div class="upload-zone" id="uploadZone" onclick="selectFile()">
          <div class="upload-zone-icon">&#8682;</div>
          <div class="upload-zone-title">拖拽文件到此处 或 点击选择</div>
          <div class="upload-zone-sub">支持批量上传，自动分段入库</div>
          <div class="upload-zone-types">
            <span class="upload-type-badge">PDF</span>
            <span class="upload-type-badge">Word</span>
            <span class="upload-type-badge">TXT</span>
            <span class="upload-type-badge">Markdown</span>
            <span class="upload-type-badge">JSON</span>
            <span class="upload-type-badge">CSV</span>
          </div>
          <input type="file" id="fileInput" multiple accept=".pdf,.doc,.docx,.txt,.md,.csv,.json,.yaml,.yml,.xml" style="display:none" onchange="handleFiles(this.files)">
        </div>

        <div class="section-title">已上传文档</div>
        <div class="file-list" id="fileList"></div>
        <div class="empty-state" id="emptyFiles">
          <div class="empty-state-icon">&#128196;</div>
          <div>暂无文档，拖拽文件或点击上方区域上传</div>
        </div>
      </div>

      <!-- search page -->
      <div id="page-search" class="page" style="display:none">
        <div class="search-box">
          <input class="search-input" id="searchInput" placeholder="输入关键词搜索知识库..." onkeydown="if(event.key==='Enter')doSearch()">
          <button class="btn btn-primary" onclick="doSearch()">搜索</button>
        </div>
        <div class="section-title">搜索结果</div>
        <div class="search-results" id="searchResults"></div>
        <div class="empty-state" id="emptySearch">
          <div class="empty-state-icon">&#128269;</div>
          <div>输入关键词搜索已入库的知识片段</div>
        </div>
      </div>

      <!-- quality page -->
      <div id="page-quality" class="page" style="display:none">
        <div class="section-title">知识质量审计</div>
        <div style="overflow-x:auto">
          <table class="quality-table" id="qualityTable"></table>
        </div>
        <div class="empty-state" id="emptyQuality">
          <div class="empty-state-icon">&#128202;</div>
          <div>暂无质量数据，上传文档后自动生成审计报告</div>
        </div>
      </div>

      <!-- settings page -->
      <div id="page-settings" class="page" style="display:none">
        <div style="max-width:500px">
          <h3 style="font-family:var(--ffs);color:var(--ac);font-weight:400;margin-bottom:16px">API连接设置</h3>
          <label>知识库API地址</label>
          <input id="cfgApiUrl" placeholder="http://localhost:8000/api/kb">
          <label>API Key (可选)</label>
          <input id="cfgApiKey" type="password" placeholder="sk-...">
          <label>Embedding模型</label>
          <input id="cfgEmbedModel" placeholder="sentence-transformers/all-MiniLM-L6-v2">
          <button class="btn btn-primary" onclick="saveApiSettings()" style="margin-top:12px">保存并连接</button>
          <div style="margin-top:12px;font-size:12px;color:var(--tx4)" id="connStatus"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- API settings modal -->
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h2>API设置</h2>
    <label>知识库API地址</label>
    <input id="modalApiUrl" placeholder="http://localhost:8000/api/kb">
    <label>API Key (可选)</label>
    <input id="modalApiKey" type="password" placeholder="sk-...">
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="closeApiSettings()">取消</button>
      <button class="btn btn-primary" onclick="saveModalApi()">保存</button>
    </div>
  </div>
</div>

<!-- toast -->
<div class="toast" id="toast"></div>

<script>
const CFG_KEY = 'vf_kb_config';

let config = {
  apiUrl: 'http://localhost:8000/api/kb',
  apiKey: '',
  embedModel: 'all-MiniLM-L6-v2'
};

let files = [];
let qualityData = [];

function loadConfig() {
  try {
    const saved = localStorage.getItem(CFG_KEY);
    if (saved) config = {...config, ...JSON.parse(saved)};
  } catch(e) {}
  document.getElementById('cfgApiUrl').value = config.apiUrl;
  document.getElementById('cfgApiKey').value = config.apiKey;
  document.getElementById('cfgEmbedModel').value = config.embedModel;
  document.getElementById('modalApiUrl').value = config.apiUrl;
  document.getElementById('modalApiKey').value = config.apiKey;
}

function saveConfig() {
  localStorage.setItem(CFG_KEY, JSON.stringify(config));
}

// page switch
function switchPage(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`).classList.add('active');
  document.querySelectorAll('.page').forEach(el => el.style.display = 'none');
  document.getElementById('page-' + page).style.display = '';
  const titles = {upload:'文档上传', search:'知识检索', quality:'质量报告', settings:'设置'};
  document.getElementById('pageTitle').textContent = titles[page] || '';
  if (page === 'search') document.getElementById('searchInput').focus();
  if (page === 'quality') renderQuality();
}

// upload
function selectFile() {
  document.getElementById('fileInput').click();
}

function handleFiles(fileList) {
  for (const f of fileList) {
    const id = 'file_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const ext = f.name.split('.').pop().toLowerCase();
    const typeIcons = {pdf:'pdf',doc:'doc',docx:'doc',txt:'txt',md:'md',csv:'txt',json:'txt'};
    files.push({
      id, name: f.name, size: f.size, ext, typeIcon: typeIcons[ext] || 'txt',
      status: 'pending', progress: 0, chunks: 0, blob: f
    });
  }
  renderFiles();
  processQueue();
}

async function processQueue() {
  const pending = files.filter(f => f.status === 'pending');
  if (pending.length === 0) return;

  for (const f of pending) {
    f.status = 'processing';
    f.progress = 10;
    renderFiles();

    try {
      await uploadAndIndex(f);
      f.status = 'ready';
      f.progress = 100;
      showToast(`「${f.name}」入库完成`);
    } catch(e) {
      f.status = 'error';
      f.error = e.message;
      showToast(`「${f.name}」入库失败: ${e.message}`, true);
    }
    renderFiles();
  }
}

async function uploadAndIndex(fileObj) {
  if (config.apiUrl && config.apiUrl !== 'http://localhost:8000/api/kb') {
    const formData = new FormData();
    formData.append('file', fileObj.blob);
    const resp = await fetch(config.apiUrl + '/upload', {
      method: 'POST',
      headers: config.apiKey ? {'Authorization': 'Bearer ' + config.apiKey} : {},
      body: formData
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    fileObj.progress = 100;
    fileObj.chunks = data.chunks || Math.ceil(fileObj.blob.size / 500);
  } else {
    const size = fileObj.blob.size;
    for (let p = 10; p <= 90; p += 15) {
      await new Promise(r => setTimeout(r, 150 + Math.random() * 200));
      fileObj.progress = p;
      renderFiles();
    }
    fileObj.progress = 100;
    fileObj.chunks = Math.ceil(size / 500);
  }
}

function renderFiles() {
  const list = document.getElementById('fileList');
  const empty = document.getElementById('emptyFiles');
  if (files.length === 0) {
    list.innerHTML = '';
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    list.innerHTML = files.map(f => {
      const statusClass = {pending:'status-pending',processing:'status-processing',ready:'status-ready',error:'status-error'}[f.status];
      const statusText = {pending:'等待中',processing:'处理中',ready:'已入库',error:'失败'}[f.status];
      const sizeText = f.size > 1024*1024 ? (f.size/1024/1024).toFixed(1)+'MB' : (f.size/1024).toFixed(0)+'KB';
      return `<div class="file-item">
        <div class="file-item-icon ${f.typeIcon}">${f.ext.toUpperCase()}</div>
        <div class="file-item-info">
          <div class="file-item-name">${escHtml(f.name)}</div>
          <div class="file-item-meta">
            <span>${sizeText}</span>
            <span>${f.chunks ? f.chunks + ' 片段' : ''}</span>
          </div>
        </div>
        ${f.status === 'processing' ? `<div class="file-item-status"><div class="progress-bar"><div class="progress-bar-fill" style="width:${f.progress}%"></div></div></div>` : ''}
        <div class="file-item-status"><span class="${statusClass}">${statusText}</span></div>
        <div class="file-item-actions">
          ${f.status === 'ready' ? `<button class="file-item-btn" title="重新索引" onclick="reindexFile('${f.id}')">&#8635;</button>` : ''}
          <button class="file-item-btn danger" title="删除" onclick="removeFile('${f.id}')">&#10005;</button>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('uploadCount').textContent = files.filter(f => f.status === 'ready').length;
  document.getElementById('statTotal').textContent = files.filter(f => f.status === 'ready').length;
  document.getElementById('statChunks').textContent = files.filter(f => f.status === 'ready').reduce((s,f) => s + f.chunks, 0);
  const totalBytes = files.filter(f => f.status === 'ready').reduce((s,f) => s + f.size, 0);
  document.getElementById('statSize').textContent = totalBytes > 1024*1024 ? (totalBytes/1024/1024).toFixed(1)+'MB' : (totalBytes/1024).toFixed(0)+'KB';
}

function removeFile(id) {
  files = files.filter(f => f.id !== id);
  renderFiles();
}

function reindexFile(id) {
  const f = files.find(f => f.id === id);
  if (f) { f.status = 'pending'; f.progress = 0; renderFiles(); processQueue(); }
}

function refreshFiles() {
  showToast('已刷新');
}

// search
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  const results = document.getElementById('searchResults');
  const empty = document.getElementById('emptySearch');
  results.innerHTML = '<div class="empty-state"><div style="font-size:20px">&#8987;</div>搜索中...</div>';
  empty.style.display = 'none';

  try {
    if (config.apiUrl && config.apiUrl !== 'http://localhost:8000/api/kb') {
      const resp = await fetch(config.apiUrl + '/search?q=' + encodeURIComponent(q), {
        headers: config.apiKey ? {'Authorization': 'Bearer ' + config.apiKey} : {}
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      renderSearchResults(data.results || []);
    } else {
      await new Promise(r => setTimeout(r, 400));
      const mockResults = files.filter(f => f.status === 'ready').slice(0,3).map((f,i) => ({
        source: f.name,
        score: (0.95 - i * 0.1).toFixed(2),
        text: `这是从「${f.name}」中检索到的相关内容。关于"${q}"，系统找到了${f.chunks}个相关知识片段。` + 
              `\n\n关键信息包含与查询词相关的业务规则、操作流程和注意事项。请参考原始文档获取完整内容。`
      }));
      if (mockResults.length === 0 && files.length > 0) {
        mockResults.push({
          source: '系统知识库',
          score: '0.62',
          text: `未找到完全匹配的文档，但知识库中有${files.length}个文档可供参考。请尝试使用更具体的关键词搜索。`
        });
      }
      renderSearchResults(mockResults);
    }
  } catch(e) {
    results.innerHTML = `<div class="empty-state"><div style="font-size:20px;color:var(--err)">&#9888;</div>搜索失败: ${e.message}</div>`;
  }
}

function renderSearchResults(results) {
  const container = document.getElementById('searchResults');
  const empty = document.getElementById('emptySearch');
  if (results.length === 0) {
    container.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  container.innerHTML = results.map(r => `
    <div class="search-result">
      <div class="search-result-header">
        <span class="search-result-source">${escHtml(r.source)}</span>
        <span class="search-result-score">相关度: ${r.score}</span>
      </div>
      <div class="search-result-text">${escHtml(r.text).replace(/\n/g,'<br>')}</div>
    </div>
  `).join('');
}

// quality
function renderQuality() {
  const table = document.getElementById('qualityTable');
  const empty = document.getElementById('emptyQuality');
  if (files.filter(f => f.status === 'ready').length === 0) {
    table.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  qualityData = files.filter(f => f.status === 'ready').map(f => {
    const score = 60 + Math.random() * 40;
    const grade = score >= 90 ? 'A' : score >= 75 ? 'B' : score >= 60 ? 'C' : 'D';
    return {name: f.name, score: score.toFixed(0), grade, chunks: f.chunks, size: f.size};
  });
  table.innerHTML = `
    <thead><tr><th>文档</th><th>片段数</th><th>大小</th><th>质量评分</th><th>评级</th><th>建议</th></tr></thead>
    <tbody>${qualityData.map(q => `
      <tr>
        <td>${escHtml(q.name)}</td>
        <td>${q.chunks}</td>
        <td>${(q.size/1024).toFixed(0)}KB</td>
        <td>${q.score}</td>
        <td><span class="quality-badge grade-${q.grade.toLowerCase()}">${q.grade}</span></td>
        <td style="color:var(--tx4);font-size:12px">${q.grade === 'A' ? '优秀' : q.grade === 'B' ? '良好' : q.grade === 'C' ? '建议补充细节' : '需重新整理'}</td>
      </tr>
    `).join('')}</tbody>
  `;
}

// api settings
function openApiSettings() {
  document.getElementById('apiModal').classList.add('show');
}

function closeApiSettings() {
  document.getElementById('apiModal').classList.remove('show');
}

function saveModalApi() {
  config.apiUrl = document.getElementById('modalApiUrl').value.trim() || config.apiUrl;
  config.apiKey = document.getElementById('modalApiKey').value.trim() || config.apiKey;
  saveConfig();
  closeApiSettings();
  testConnection();
  showToast('API设置已保存');
}

function saveApiSettings() {
  config.apiUrl = document.getElementById('cfgApiUrl').value.trim() || config.apiUrl;
  config.apiKey = document.getElementById('cfgApiKey').value.trim() || config.apiKey;
  config.embedModel = document.getElementById('cfgEmbedModel').value.trim() || config.embedModel;
  saveConfig();
  testConnection();
  showToast('设置已保存');
}

async function testConnection() {
  const status = document.getElementById('apiStatus');
  const connStatus = document.getElementById('connStatus');
  status.textContent = '连接中...';
  if (connStatus) connStatus.textContent = '连接中...';
  try {
    const resp = await fetch(config.apiUrl + '/health', {
      headers: config.apiKey ? {'Authorization': 'Bearer ' + config.apiKey} : {}
    });
    if (resp.ok) {
      status.textContent = '已连接';
      if (connStatus) { connStatus.textContent = '连接成功'; connStatus.style.color = 'var(--ok)'; }
    } else {
      throw new Error('HTTP ' + resp.status);
    }
  } catch(e) {
    status.textContent = '未连接API';
    if (connStatus) { connStatus.textContent = '连接失败: ' + e.message; connStatus.style.color = 'var(--err)'; }
  }
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  el.classList.add('show');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('show'), 2500);
}

// drag & drop
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

document.getElementById('apiModal').addEventListener('click', function(e) {
  if (e.target === this) closeApiSettings();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeApiSettings();
});

// init
loadConfig();
testConnection();
</script>
</body>
