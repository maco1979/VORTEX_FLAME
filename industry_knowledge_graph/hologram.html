<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VORTEX FLAME · Galaxy</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --void: #04040a;
            --deep: #08080f;
            --surface: #0e0e18;
            --elevated: #14141f;
            --hover: #1a1a28;
            --border-s: #1c1c2a;
            --border-d: #2a2a3a;
            --t1: #e4e4ed;
            --t2: #8888a0;
            --t3: #5a5a70;
            --accent: #7c3aed;
            --accent-d: #5b21b6;
            --font-sans: 'Outfit', 'Noto Sans SC', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none
        }

        html,
        body {
            height: 100%;
            overflow: hidden
        }

        body {
            background: var(--void);
            color: var(--t1);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: grab;
            touch-action: none
        }

        canvas:active {
            cursor: grabbing
        }

        .hdr {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px dashed var(--border-s);
            background: rgba(8, 8, 15, .92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 0 20px;
            height: 50px;
            z-index: 100
        }

        .hdr-l {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .logo-ic {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 0 16px rgba(124, 58, 237, .35)
        }

        .logo-t {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -.2px
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 5px;
            border-radius: 6px;
            border: 1px solid var(--border-s);
            background: var(--surface);
            padding: 4px 10px;
            font-size: 12px;
            color: var(--t2)
        }

        .badge .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        .srch {
            position: relative;
            max-width: 360px;
            flex: 1;
            margin: 0 16px
        }

        .srch-in {
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 6px;
            border: 1px solid var(--border-s);
            background: var(--surface);
            padding: 6px 12px;
            transition: all .2s
        }

        .srch-in:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(124, 58, 237, .12)
        }

        .srch-in input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--t1);
            font-size: 12px;
            font-family: var(--font-sans);
            outline: none;
            -webkit-user-select: text;
            user-select: text
        }

        .srch-in input::placeholder {
            color: var(--t3)
        }

        .srch-in .kbd {
            border-radius: 3px;
            border: 1px solid var(--border-s);
            background: var(--elevated);
            padding: 0 5px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--t3)
        }

        .srch-dd {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            border-radius: 10px;
            border: 1px solid var(--border-s);
            background: var(--surface);
            box-shadow: 0 12px 40px rgba(0, 0, 0, .6);
            overflow: hidden;
            display: none;
            z-index: 110;
            max-height: 280px;
            overflow-y: auto
        }

        .srch-dd.show {
            display: block
        }

        .srch-dd .item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            cursor: pointer;
            transition: background .12s
        }

        .srch-dd .item:hover {
            background: rgba(124, 58, 237, .12)
        }

        .srch-dd .item .ic {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .srch-dd .item .nm {
            flex: 1;
            font-size: 12px;
            font-weight: 500
        }

        .srch-dd .item .tp {
            border-radius: 3px;
            background: var(--elevated);
            padding: 1px 6px;
            font-size: 10px;
            color: var(--t3);
            font-family: var(--font-mono)
        }

        .hdr-r {
            display: flex;
            align-items: center;
            gap: 6px
        }

        .hdr-r .stat {
            font-size: 10px;
            color: var(--t3);
            font-family: var(--font-mono)
        }

        .ibtn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border-s);
            background: var(--elevated);
            color: var(--t2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all .12s
        }

        .ibtn:hover {
            background: var(--hover);
            color: var(--t1)
        }

        .ai-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent), var(--accent-d));
            color: #fff;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 20px rgba(124, 58, 237, .2);
            transition: all .2s
        }

        .ai-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 30px rgba(124, 58, 237, .35)
        }

        .sel-bar {
            position: fixed;
            top: 56px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 10px;
            border: 1px solid rgba(124, 58, 237, .25);
            background: rgba(124, 58, 237, .12);
            padding: 6px 14px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 90;
            display: none;
            font-size: 12px
        }

        .sel-bar.show {
            display: flex
        }

        .sel-bar .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite
        }

        .sel-bar .nm {
            font-family: var(--font-mono);
            font-weight: 500
        }

        .sel-bar .tp {
            font-size: 10px;
            color: var(--t3)
        }

        .sel-bar .x {
            margin-left: 6px;
            border-radius: 3px;
            padding: 1px 6px;
            font-size: 10px;
            color: var(--t2);
            cursor: pointer
        }

        .sel-bar .x:hover {
            background: rgba(255, 255, 255, .08);
            color: var(--t1)
        }

        .breadcrumb {
            position: fixed;
            top: 56px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--t3);
            z-index: 90;
            display: none
        }

        .breadcrumb.show {
            display: flex
        }

        .breadcrumb .bc {
            cursor: pointer;
            transition: color .15s
        }

        .breadcrumb .bc:hover {
            color: var(--accent)
        }

        .breadcrumb .sep {
            color: var(--border-d)
        }

        .rpanel {
            position: fixed;
            top: 50px;
            right: 0;
            bottom: 0;
            width: 360px;
            background: var(--deep);
            border-left: 1px solid var(--border-s);
            z-index: 120;
            transform: translateX(100%);
            transition: transform .3s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .rpanel.open {
            transform: translateX(0)
        }

        .rpanel .tabs {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-s);
            background: var(--surface);
            padding: 0 10px
        }

        .rpanel .tab {
            display: flex;
            align-items: center;
            gap: 5px;
            border-radius: 5px;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: 500;
            color: var(--t3);
            cursor: pointer;
            transition: all .12s
        }

        .rpanel .tab:hover {
            color: var(--t2);
            background: var(--hover)
        }

        .rpanel .tab.on {
            color: var(--accent);
            background: rgba(124, 58, 237, .08)
        }

        .rpanel .tab .new {
            border-radius: 8px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            padding: 0 5px;
            font-size: 8px;
            font-weight: 600;
            color: #fff
        }

        .rpanel .pbody {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-d) var(--deep)
        }

        .rpanel .pbody::-webkit-scrollbar {
            width: 5px
        }

        .rpanel .pbody::-webkit-scrollbar-track {
            background: var(--deep)
        }

        .rpanel .pbody::-webkit-scrollbar-thumb {
            background: var(--border-d);
            border-radius: 3px
        }

        .pcard {
            border-radius: 8px;
            border: 1px solid var(--border-s);
            background: var(--surface);
            padding: 12px;
            margin-bottom: 8px
        }

        .pcard h4 {
            font-size: 11px;
            font-weight: 600;
            color: var(--t2);
            letter-spacing: .5px;
            text-transform: uppercase;
            margin-bottom: 8px
        }

        .pcard .srow {
            display: flex;
            gap: 5px;
            margin-bottom: 6px
        }

        .pcard .sc {
            flex: 1;
            border-radius: 6px;
            background: var(--elevated);
            border: 1px solid var(--border-s);
            padding: 8px 6px;
            text-align: center
        }

        .pcard .sc .v {
            font-size: 16px;
            font-weight: 700;
            font-family: var(--font-mono)
        }

        .pcard .sc .l {
            font-size: 8px;
            color: var(--t3);
            margin-top: 2px;
            letter-spacing: .5px;
            text-transform: uppercase
        }

        .pcard .info {
            font-size: 11px;
            color: var(--t2);
            line-height: 1.9
        }

        .pcard .info b {
            color: var(--t1);
            font-weight: 600
        }

        .tag {
            display: inline-block;
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 5px;
            margin: 1px;
            font-weight: 500;
            font-family: var(--font-mono)
        }

        .ctrls {
            position: fixed;
            right: 12px;
            bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            z-index: 80
        }

        .ctrls .div {
            height: 1px;
            background: var(--border-s);
            margin: 1px 5px
        }

        .layout-ind {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 5px;
            border-radius: 16px;
            border: 1px solid rgba(16, 185, 129, .25);
            background: rgba(16, 185, 129, .1);
            padding: 4px 12px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 80;
            display: none;
            font-size: 11px;
            color: #34d399;
            font-weight: 500
        }

        .layout-ind.show {
            display: flex
        }

        .layout-ind .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #34d399;
            animation: ping 1.5s cubic-bezier(0, 0, .2, 1) infinite
        }

        @keyframes ping {

            75%,
            100% {
                transform: scale(2);
                opacity: 0
            }
        }

        .tip {
            position: fixed;
            pointer-events: none;
            border-radius: 6px;
            border: 1px solid var(--border-d);
            background: var(--elevated);
            padding: 5px 10px;
            font-size: 11px;
            z-index: 200;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            box-shadow: 0 6px 20px rgba(0, 0, 0, .5)
        }

        .tip .n {
            font-family: var(--font-mono);
            font-weight: 500
        }

        .tip .k {
            font-size: 9px;
            color: var(--t3);
            margin-left: 5px
        }

        @media(max-width:768px) {
            .hdr {
                padding: 0 8px;
                height: 44px
            }

            .badge {
                display: none
            }

            .srch {
                margin: 0 6px;
                max-width: 180px
            }

            .rpanel {
                width: 100%;
                border-left: none
            }

            .hdr-r .stat {
                display: none
            }

            .ctrls {
                right: 8px;
                bottom: 8px
            }
        }
    </style>
</head>

        function h2r(c) { if (!c || c.startsWith('hsl')) return { r: 100, g: 100, b: 100 }; let h = c.replace('#', ''); if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2]; return { r: parseInt(h.substr(0, 2), 16), g: parseInt(h.substr(2, 2), 16), b: parseInt(h.substr(4, 2), 16) } }
        function tr(s, n) { return s.length > n ? s.slice(0, n) + '…' : s }
        function s2w(sx, sy) { return { x: (sx - W / 2) / cam.z + cam.x, y: (sy - H / 2) / cam.z + cam.y } }
        function findN(wx, wy) {
            let b = null, bd = 1e9;
            for (let n of ns) {
                let nx = n.x, ny = n.y;
                if (view === 'galaxy' && galaxyAngle !== 0) {
                    let cosA = Math.cos(-galaxyAngle), sinA = Math.sin(-galaxyAngle);
                    let dx = n.x - cam.x, dy = n.y - cam.y;
                    nx = cam.x + dx * cosA - dy * sinA;
                    ny = cam.y + dx * sinA + dy * cosA;
                }
                let dx = nx - wx, dy = ny - wy, d = Math.sqrt(dx * dx + dy * dy);
                if (d < n.r + 5 / cam.z && d < bd) { b = n; bd = d }
            }
            return b
        }

                let m = n.meta;
                h += '<div class="pcard"><h4>Overview</h4><div class="srow"><div class="sc"><div class="v" style="color:' + n.c + '">' + m.tier + '</div><div class="l">Tier</div></div><div class="sc"><div class="v" style="color:' + (m.status.includes('博弈') || m.status.includes('全通') ? '#34d399' : '#5a5a70') + '">' + (m.status.includes('博弈') ? '🟢' : m.status.includes('全通') ? '✅' : '⏳') + '</div><div class="l">Status</div></div></div><div class="info"><b>Expertise</b> ' + m.expert + '<br><b>Domain</b> ' + m.domain + '<br><b>Status</b> ' + m.status + '</div></div>';
                if (m.kb > 0 || m.weights > 0) { h += '<div class="pcard"><h4>Training Data</h4><div class="srow">'; if (m.kb > 0) h += '<div class="sc"><div class="v" style="color:#fbbf24">' + (m.kb / 1000 | 0) + 'K</div><div class="l">Knowledge</div></div>'; if (m.weights > 0) h += '<div class="sc"><div class="v" style="color:#34d399">' + (m.weightMB >= 1000 ? (m.weightMB / 1000).toFixed(1) + 'G' : Math.round(m.weightMB) + 'M') + '</div><div class="l">Weights</div></div>'; if (m.iters > 0) h += '<div class="sc"><div class="v" style="color:#7c3aed">' + m.iters + '</div><div class="l">Iters</div></div>'; if (m.stages > 0) h += '<div class="sc"><div class="v" style="color:#ec4899">' + m.stages + '</div><div class="l">Stages</div></div>'; h += '</div></div>' }
                if (m.orbit) { h += '<div class="pcard"><h4>Tool Chain</h4>'; m.orbit.forEach(t => { h += '<span class="tag" style="background:rgba(96,165,250,.1);color:#60a5fa">' + t + '</span>' }); h += '</div>' }
                let cross = D.links.filter(l => l[0] === n.id || l[1] === n.id).map(l => l[0] === n.id ? l[1] : l[0]);
                if (cross.length) { h += '<div class="pcard"><h4>Cross-Domain</h4>'; cross.forEach(c => { let s = D.souls.find(s => s.id === c); if (s) { let rgb = h2r(s.c); h += '<span class="tag" style="background:rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',.1);color:' + s.c + '">' + s.ic + ' ' + s.n + '</span>' } }); h += '</div>' }
                if (view === 'galaxy') h += '<div class="pcard" style="text-align:center;padding:10px"><span style="font-size:11px;color:var(--t3)">Double-click to enter star system →</span></div>';
            } else if (n.kind === 'kb' && n.meta) {
                h += '<div class="pcard"><h4>Knowledge Base</h4><div class="srow"><div class="sc"><div class="v" style="color:#fbbf24">' + (n.meta.kb / 1000 | 0) + 'K</div><div class="l">Entries</div></div><div class="sc"><div class="v" style="color:#fbbf24">' + n.meta.kbMB + '</div><div class="l">FAISS MB</div></div></div></div>';
            } else if (n.kind === 'wt' && n.meta) {
                h += '<div class="pcard"><h4>Weights</h4><div class="srow"><div class="sc"><div class="v" style="color:#34d399">' + n.meta.iters + '</div><div class="l">Iters</div></div><div class="sc"><div class="v" style="color:#34d399">' + n.meta.stages + '</div><div class="l">Stages</div></div><div class="sc"><div class="v" style="color:#34d399">' + n.meta.weights + '</div><div class="l">Files</div></div></div></div>';
            } else if (n.kind === 'tool' && n.meta) {
                h += '<div class="pcard"><div class="info"><b>Tool</b> ' + n.meta.tool + '</div></div>';
            } else if (n.kind === 'link' && n.meta) { h += '<div class="pcard"><h4>Linked Soul</h4><div class="info"><b>Name</b> ' + n.meta.n + '<br><b>Expertise</b> ' + n.meta.expert + '<br><b>Domain</b> ' + n.meta.domain + '</div></div>' }
            document.getElementById('pbody').innerHTML = h; openPanel();
        }

        function onSrch(e) {
            let q = e.target.value.toLowerCase().trim(), dd = document.getElementById('sdd');
            if (!q) { dd.classList.remove('show'); return }
            let results = D.souls.filter(s => s.n.toLowerCase().includes(q) || s.en.toLowerCase().includes(q) || s.expert.toLowerCase().includes(q) || s.domain.toLowerCase().includes(q)).slice(0, 8);
            if (!results.length) { dd.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:var(--t3)">No results for "' + q + '"</div>'; dd.classList.add('show'); return }
            dd.innerHTML = results.map(s => '<div class="item" onmousedown="pickSoul(\'' + s.id + '\')"><span class="ic" style="background:' + s.c + '"></span><span class="nm">' + s.ic + ' ' + s.n + '</span><span class="tp">Tier ' + s.tier + '</span></div>').join('');
            dd.classList.add('show');
        }
        function pickSoul(id) { enterSystem(id); document.getElementById('si').value = ''; document.getElementById('sdd').classList.remove('show') }

        init();
    </script>
</body>

</html>
