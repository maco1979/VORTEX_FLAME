function initStars(){
stars=[];
for(var i=0;i<200;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.3,a:Math.random()*0.5+0.2,s:Math.random()*0.001+0.0005});
}

function layoutRing(){
if(!cur)return;
cur.x=W/2;cur.y=H/2;
var n=ring.length;if(n===0)return;
var rr=Math.max(180,Math.min(350,Math.min(W,H)*0.28));
ring.forEach(function(nd,i){
var a=(i/n)*Math.PI*2-Math.PI/2;
nd.x=W/2+Math.cos(a)*rr;
nd.y=H/2+Math.sin(a)*rr;
});
}

function initParticles(){
particles=[];
if(!cur)return;
ring.forEach(function(nd){
for(var i=0;i<2;i++)particles.push({sx:cur.x,sy:cur.y,tx:nd.x,ty:nd.y,t:Math.random(),sp:0.003+Math.random()*0.004,c:nd.c});
});
}

function drillInto(id){
var nd=N[id];if(!nd)return;
var ch=gc(id);
path.push(cur);
cur=Object.assign({id:id},nd,{x:W/2,y:H/2});
ring=ch;
transform=d3.zoomIdentity;
d3.select(canvas).call(zoom.transform,transform);
layoutRing();initParticles();updateBC();updateLI();
document.getElementById('info-panel').classList.remove('visible');
setTimeout(function(){document.getElementById('drill-hint').style.opacity='0';},500);
}

function drillBack(){
if(path.length===0)return;
cur=path.pop();
ring=gc(cur.id);
transform=d3.zoomIdentity;
d3.select(canvas).call(zoom.transform,transform);
layoutRing();initParticles();updateBC();updateLI();
document.getElementById('info-panel').classList.remove('visible');
}

function drillTo(idx){
cur=path[idx];
path=path.slice(0,idx);
ring=gc(cur.id);
transform=d3.zoomIdentity;
d3.select(canvas).call(zoom.transform,transform);
layoutRing();initParticles();updateBC();updateLI();
document.getElementById('info-panel').classList.remove('visible');
}

function goRoot(){
path=[];cur=Object.assign({id:'HQ'},N.HQ,{x:W/2,y:H/2});
ring=gc('HQ');
transform=d3.zoomIdentity;
d3.select(canvas).call(zoom.transform,transform);
layoutRing();initParticles();updateBC();updateLI();
document.getElementById('info-panel').classList.remove('visible');
}

function updateBC(){
var bc=document.getElementById('breadcrumb');
var h='<span onclick="goRoot()" style="cursor:pointer;color:#ff6b6b">总控</span>';
path.forEach(function(d,i){
h+=' <span class="sep">›</span> <span onclick="drillTo('+i+')" style="cursor:pointer;color:#888">'+d.n+'</span>';
});
if(cur&&cur.id!=='HQ')h+=' <span class="sep">›</span> <span class="active">'+cur.n+'</span>';
bc.innerHTML=h;
}

function updateLI(){
var ln=document.getElementById('layer-name');
var lh=document.getElementById('layer-hint');
if(!cur)return;
ln.style.color=cur.c;
ln.textContent=TL[cur.t]||'';
lh.textContent=TH[cur.t]||'';
}

function getR(nd,isC){
if(isC)return 45;
if(nd.t==='hq')return 35;
if(nd.t==='store')return 28;
if(nd.t==='compute')return 25;
if(nd.t==='soul')return 26;
return 20;
}

function statusAlpha(nd){
if(nd.s==='active')return 1;
if(nd.s==='training'||nd.s==='preparing')return 0.75;
return 0.4;
}

function draw(){
ctx.save();
ctx.clearRect(0,0,W,H);
ctx.translate(transform.x,transform.y);
ctx.scale(transform.k,transform.k);

stars.forEach(function(s){
s.a+=Math.sin(Date.now()*s.s)*0.01;
ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle='rgba(255,255,255,'+Math.max(0.1,Math.min(0.6,s.a))+')';
ctx.fill();
});

if(cur){
var pulse=Math.sin(Date.now()*0.003)*0.3+0.7;
ctx.beginPath();ctx.arc(cur.x,cur.y,55,0,Math.PI*2);
ctx.fillStyle=cur.c+Math.floor(pulse*20).toString(16).padStart(2,'0');
ctx.fill();

ring.forEach(function(nd){
var sa=statusAlpha(nd);
ctx.beginPath();ctx.moveTo(cur.x,cur.y);ctx.lineTo(nd.x,nd.y);
ctx.strokeStyle=nd.c+Math.floor(sa*48).toString(16).padStart(2,'0');
ctx.lineWidth=2;ctx.stroke();
});

particles.forEach(function(p){
p.t+=p.sp;if(p.t>1)p.t-=1;
var x=p.sx+(p.tx-p.sx)*p.t;
var y=p.sy+(p.ty-p.sy)*p.t;
ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);
ctx.fillStyle=p.c+'90';ctx.fill();
});

ring.forEach(function(nd){
var r=getR(nd,false);
var sa=statusAlpha(nd);
var isH=hovered===nd;

if(isH){
ctx.beginPath();ctx.arc(nd.x,nd.y,r+10,0,Math.PI*2);
ctx.fillStyle=nd.c+'18';ctx.fill();
}

ctx.beginPath();ctx.arc(nd.x,nd.y,r,0,Math.PI*2);
var g=ctx.createRadialGradient(nd.x-r*0.3,nd.y-r*0.3,0,nd.x,nd.y,r);
g.addColorStop(0,nd.c);g.addColorStop(1,nd.c+Math.floor(sa*136).toString(16).padStart(2,'0'));
ctx.fillStyle=g;ctx.fill();
ctx.strokeStyle=isH?'#fff':nd.c+'60';
ctx.lineWidth=isH?2.5:1.5;ctx.stroke();

if(nd.s==='locked'||nd.s==='planned'){
ctx.beginPath();ctx.arc(nd.x,nd.y,r,0,Math.PI*2);
ctx.fillStyle='rgba(10,10,26,0.45)';ctx.fill();
ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.stroke();
ctx.fillStyle='#555';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('\u{1F512}',nd.x,nd.y-r*0.3);
}

if(nd.s==='active'){
ctx.beginPath();ctx.arc(nd.x+r*0.6,nd.y-r*0.6,5,0,Math.PI*2);
ctx.fillStyle='#4ecdc4';ctx.fill();
ctx.strokeStyle='#0a0a1a';ctx.lineWidth=1.5;ctx.stroke();
}

if(nd.s==='training'||nd.s==='preparing'){
ctx.beginPath();ctx.arc(nd.x+r*0.6,nd.y-r*0.6,5,0,Math.PI*2);
ctx.fillStyle='#feca57';ctx.fill();
ctx.strokeStyle='#0a0a1a';ctx.lineWidth=1.5;ctx.stroke();
}

ctx.fillStyle=sa>0.5?'#fff':'#999';
ctx.font=(nd.n.length>4?'10px':'11px')+' sans-serif';
ctx.textAlign='center';ctx.textBaseline='middle';
var nm=nd.n.length>5?nd.n.slice(0,5)+'..':nd.n;
ctx.fillText(nm,nd.x,nd.y+(nd.s==='locked'||nd.s==='planned'?r*0.25:0));
});

var cr=getR(cur,true);
ctx.beginPath();ctx.arc(cur.x,cur.y,cr,0,Math.PI*2);
var cg=ctx.createRadialGradient(cur.x-cr*0.3,cur.y-cr*0.3,0,cur.x,cur.y,cr);
cg.addColorStop(0,cur.c);cg.addColorStop(1,cur.c+'88');
ctx.fillStyle=cg;ctx.fill();
ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();

ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
var cn=cur.n.length>8?cur.n.slice(0,8)+'..':cur.n;
ctx.fillText(cn,cur.x,cur.y-6);
ctx.fillStyle='#ccc';ctx.font='10px sans-serif';
ctx.fillText(TL[cur.t]||'',cur.x,cur.y+10);
}

ctx.restore();
requestAnimationFrame(draw);
}

function findNode(mx,my){
var x=(mx-transform.x)/transform.k;
var y=(my-transform.y)/transform.k;
var closest=null,minD=Infinity;
if(cur){
var d=Math.hypot(cur.x-x,cur.y-y);
if(d<getR(cur,true)+5){closest=Object.assign({},cur,{isCenter:true});minD=d;}
}
ring.forEach(function(nd){
var d=Math.hypot(nd.x-x,nd.y-y);
var r=getR(nd,false)+5;
if(d<r&&d<minD){closest=Object.assign({},nd,{isCenter:false});minD=d;}
});
return closest;
}

function showInfo(nd){
if(!nd)return;
var p=document.getElementById('info-panel');
var c=document.getElementById('panel-content');
var sa=statusAlpha(nd);
var h='<div class="node-name" style="color:'+nd.c+'">'+nd.n+'</div>';
h+='<div class="node-type">'+(TL[nd.t]||nd.t)+'</div>';

var sl=SL[nd.s]||nd.s;
var sc=SC[nd.s]||'#555';
h+='<div class="tag" style="background:'+sc+'22;color:'+sc+'">'+sl+'</div>';

if(nd.expert)h+='<div class="tag" style="background:'+nd.c+'22;color:'+nd.c+'">'+nd.expert+'</div>';
if(nd.tier)h+='<div class="tag" style="background:rgba(255,255,255,0.05);color:#888">Tier '+nd.tier+'</div>';
if(nd.city)h+='<div class="tag" style="background:rgba(254,202,87,0.15);color:#feca57">'+nd.city+'</div>';
if(nd.train)h+='<div class="tag" style="background:'+(nd.train.indexOf('训练中')>=0?'rgba(78,205,196,0.15)':'rgba(255,255,255,0.05)')+';color:'+(nd.train.indexOf('训练中')>=0?'#4ecdc4':'#888')+'">'+nd.train+'</div>';
if(nd.ind)h+='<div class="tag" style="background:rgba(69,183,209,0.15);color:#45b7d1">'+nd.ind+'</div>';

if(nd.d)h+='<div class="desc">'+nd.d+'</div>';
if(nd.focus)h+='<div class="section"><div class="section-title">专注领域</div><div class="desc">'+nd.focus+'</div></div>';

if(nd.gpus){
h+='<div class="section"><div class="section-title">硬件配置</div>';
h+='<div class="metric"><span class="label">GPU</span><span class="value">'+nd.gpus+'</span></div>';
h+='<div class="metric"><span class="label">显存</span><span class="value">'+nd.vram+'</span></div>';
h+='<div class="metric"><span class="label">角色</span><span class="value">'+nd.role+'</span></div>';
h+='</div>';
}
if(nd.lora){
h+='<div class="section"><div class="section-title">模型信息</div>';
h+='<div class="metric"><span class="label">LoRA大小</span><span class="value">'+nd.lora+'</span></div>';
h+='</div>';
}
if(nd.area){
h+='<div class="section"><div class="section-title">门店信息</div>';
h+='<div class="metric"><span class="label">面积</span><span class="value">'+nd.area+'</span></div>';
h+='</div>';
}

var pid=gp(nd.id);
if(pid&&N[pid]){
var pn=N[pid];
h+='<div class="section"><div class="section-title">上级节点</div><ul class="child-list">';
h+='<li onclick="drillInto(\''+pid+'\')"><div class="dot" style="background:'+pn.c+'"></div>'+pn.n+'</li>';
h+='</ul></div>';
}

var ch=gc(nd.id);
if(ch.length>0){
h+='<div class="section"><div class="section-title">下级节点 ('+ch.length+')</div><ul class="child-list">';
ch.forEach(function(c2){
var csl=SL[c2.s]||c2.s;
var csc=SC[c2.s]||'#555';
h+='<li onclick="drillInto(\''+c2.id+'\')"><div class="dot" style="background:'+c2.c+'"></div>'+c2.n+'<span class="status-icon" style="color:'+csc+'">'+(c2.s==='active'?'\u2713':c2.s==='locked'?'\u{1F512}':'\u23F3')+'</span></li>';
});
h+='</ul></div>';
}

if(nd.s==='locked'){
h+='<button class="action-btn secondary" onclick="alert(\'该功能待灵魂模型训练完成后开放，敬请期待\')">敬请期待</button>';
}else if(nd.s==='planned'){
h+='<button class="action-btn secondary" onclick="alert(\'该节点正在规划中，敬请期待\')">敬请期待</button>';
}else if(nd.s==='active'&&ch.length>0){
h+='<button class="action-btn primary" onclick="drillInto(\''+nd.id+'\')">展开下级 ('+ch.length+')</button>';
}

c.innerHTML=h;
p.classList.add('visible');
}

canvas.addEventListener('mousemove',function(e){
var nd=findNode(e.clientX,e.clientY);
hovered=nd;
canvas.style.cursor=nd?'pointer':'grab';
var tip=document.getElementById('tooltip');
if(nd){
var tt='<div style="color:'+nd.c+';font-weight:600">'+nd.n+'</div>';
if(nd.expert)tt+='<div style="color:#888;font-size:11px">'+nd.expert+'</div>';
var sl=SL[nd.s]||nd.s;
var sc=SC[nd.s]||'#555';
tt+='<div style="color:'+sc+';font-size:10px;margin-top:2px">'+sl+'</div>';
if(!nd.isCenter){
var ch=gc(nd.id);
if(ch.length>0)tt+='<div style="color:#666;font-size:10px">点击展开 '+ch.length+' 个下级</div>';
else tt+='<div style="color:#666;font-size:10px">点击查看详情</div>';
}else{
tt+='<div style="color:#666;font-size:10px">点击查看详情</div>';
}
tip.innerHTML=tt;
tip.style.left=(e.clientX+15)+'px';
tip.style.top=(e.clientY-10)+'px';
tip.classList.add('visible');
}else{
tip.classList.remove('visible');
}
});

canvas.addEventListener('click',function(e){
var nd=findNode(e.clientX,e.clientY);
if(!nd){document.getElementById('info-panel').classList.remove('visible');return;}
if(nd.isCenter){
showInfo(nd);
}else{
var ch=gc(nd.id);
if(ch.length>0){
drillInto(nd.id);
}else{
showInfo(nd);
}
}
});

var touchStart=null;var touchMoved=false;
canvas.addEventListener('touchstart',function(e){
if(e.touches.length===1){touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};touchMoved=false;}
},{passive:true});
canvas.addEventListener('touchmove',function(){touchMoved=true;},{passive:true});
canvas.addEventListener('touchend',function(e){
if(!touchMoved&&touchStart){
var nd=findNode(touchStart.x,touchStart.y);
if(!nd){document.getElementById('info-panel').classList.remove('visible');return;}
if(nd.isCenter){showInfo(nd);}
else{var ch=gc(nd.id);if(ch.length>0){drillInto(nd.id);}else{showInfo(nd);}}
}
touchStart=null;
},{passive:true});

document.getElementById('panel-close').addEventListener('click',function(){
document.getElementById('info-panel').classList.remove('visible');
});

var zoom=d3.zoom().scaleExtent([0.3,4]).touchable(function(){return('ontouchstart' in window?'touch':null);}).on('zoom',function(e){transform=e.transform;});
d3.select(canvas).call(zoom).on('touchstart.zoom',null);

document.getElementById('btn-fit').addEventListener('click',function(){
d3.select(canvas).transition().duration(500).call(zoom.transform,d3.zoomIdentity);
});
document.getElementById('btn-zin').addEventListener('click',function(){
d3.select(canvas).transition().duration(300).call(zoom.scaleBy,1.3);
});
document.getElementById('btn-zout').addEventListener('click',function(){
d3.select(canvas).transition().duration(300).call(zoom.scaleBy,0.7);
});
document.getElementById('btn-back').addEventListener('click',drillBack);

function init(){
window.addEventListener('resize',function(){resize();initStars();layoutRing();initParticles();});
resize();initStars();
cur=Object.assign({id:'HQ'},N.HQ,{x:W/2,y:H/2});
ring=gc('HQ');
layoutRing();initParticles();updateBC();updateLI();
draw();
setTimeout(function(){document.getElementById('drill-hint').style.opacity='0';},6000);
}
</script>
</body>
</html>
