<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="魔方AI">
  <link rel="manifest" href="manifest.json">
  <title>宇宙魔方AI · 找到你的AI专家</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-deep: #030311;
      --bg-card: rgba(8, 8, 28, 0.88);
      --glass: rgba(12, 12, 35, 0.75);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-border-hover: rgba(78, 205, 196, 0.25);
      --accent: #4ecdc4;
      --accent2: #a29bfe;
      --accent3: #ff9ff3;
      --gold: #feca57;
      --text-primary: #f0f0f5;
      --text-secondary: #8888aa;
      --text-muted: #555570;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow-glow: 0 0 30px rgba(78, 205, 196, 0.08);
      --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 1px rgba(255, 255, 255, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none
    }

    body {
      background: var(--bg-deep);
      overflow: hidden;
      font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      touch-action: manipulation;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none
    }

    #canvas:active {
      cursor: grabbing
    }

    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: linear-gradient(180deg, rgba(3, 3, 17, 0.98) 0%, rgba(3, 3, 17, 0.7) 60%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03)
    }

    #header .brand {
      display: flex;
      align-items: center;
      gap: 12px
    }

    #header .brand-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 20px rgba(78, 205, 196, 0.2)
    }

    #header h1 {
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(135deg, #4ecdc4, #45b7d1, #a29bfe, #feca57);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 3px;
      animation: brandShift 8s ease infinite
    }

    @keyframes brandShift {

      0%,
      100% {
        background-position: 0% 50%
      }

      50% {
        background-position: 100% 50%
      }
    }

    #header .sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 4px;
      letter-spacing: 2px;
      font-weight: 400
    }

    #search-wrap {
      position: relative;
      width: 300px
    }

    #search-input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border-radius: 28px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
      -webkit-backdrop-filter: blur(24px);
      backdrop-filter: blur(24px);
      transition: all .3s;
      letter-spacing: 0.5px
    }

    #search-input::placeholder {
      color: var(--text-muted);
      font-weight: 300
    }

    #search-input:focus {
      border-color: var(--glass-border-hover);
      background: rgba(15, 15, 40, 0.85);
      box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.06), var(--shadow-glow)
    }

    #search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none
    }

    #search-results {
      position: absolute;
      top: 50px;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--glass-border-hover);
      border-radius: var(--radius);
      max-height: 400px;
      overflow-y: auto;
      display: none;
      -webkit-backdrop-filter: blur(30px);
      backdrop-filter: blur(30px);
      box-shadow: var(--shadow-card), 0 0 40px rgba(78, 205, 196, 0.05)
    }

    #search-results.visible {
      display: block
    }

    .sr-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background .15s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03)
    }

    .sr-item:last-child {
      border-bottom: none
    }

    .sr-item:hover {
      background: rgba(78, 205, 196, 0.08)
    }

    .sr-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .sr-name {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0
    }

    .sr-type {
      font-size: 10px;
      color: #666;
      margin-left: auto
    }

    .sr-status {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px
    }

    #breadcrumb {
      position: fixed;
      top: 70px;
      left: 32px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      pointer-events: auto;
      flex-wrap: wrap;
      font-weight: 500
    }

    #breadcrumb span {
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
      padding: 2px 6px;
      border-radius: 4px
    }

    #breadcrumb span:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.04)
    }

    #breadcrumb span.active {
      color: var(--accent);
      cursor: default;
      background: rgba(78, 205, 196, 0.06)
    }

    #breadcrumb .sep {
      color: #222;
      font-size: 10px;
      padding: 0;
      cursor: default
    }

    #breadcrumb .sep:hover {
      background: transparent;
      color: #222
    }

    #layer-info {
      position: fixed;
      top: 44px;
      right: 32px;
      z-index: 100;
      text-align: right;
      pointer-events: none
    }

    #layer-info .layer-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px
    }

    #layer-info .layer-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      font-weight: 400
    }

    #quick-start {
      position: fixed;
      top: 50%;
      right: 28px;
      transform: translateY(-50%);
      z-index: 100;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px;
      width: 200px;
      -webkit-backdrop-filter: blur(30px);
      backdrop-filter: blur(30px);
      box-shadow: var(--shadow-card), var(--shadow-glow)
    }

    #quick-start .qs-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.6
    }

    #quick-start .qs-step {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      font-size: 12px;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      transition: all .25s;
      font-weight: 500;
      letter-spacing: 0.3px
    }

    #quick-start .qs-step:hover {
      background: rgba(78, 205, 196, 0.06);
      transform: translateX(-2px)
    }

    #quick-start .qs-step .qs-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 8px currentColor
    }

    #quick-start .qs-step .qs-badge {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 6px;
      margin-left: auto;
      font-weight: 600;
      letter-spacing: 0.5px
    }

    #quick-start .qs-step .qs-badge.ready {
      background: rgba(78, 205, 196, 0.1);
      color: var(--accent)
    }

    #quick-start .qs-step .qs-badge.soon {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-muted)
    }

    #legend {
      position: fixed;
      bottom: 28px;
      left: 28px;
      z-index: 100;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 16px 20px;
      font-size: 11px;
      -webkit-backdrop-filter: blur(30px);
      backdrop-filter: blur(30px);
      box-shadow: var(--shadow-card)
    }

    #legend .title {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-transform: uppercase
    }

    #legend .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 5px 0;
      font-weight: 500
    }

    #legend .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor
    }

    #legend .arrow {
      color: #222;
      font-size: 10px;
      margin: 2px 0
    }

    #legend .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
      font-size: 10px;
      color: var(--text-secondary)
    }

    #legend .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1.5px solid
    }

    #controls {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 100;
      display: flex;
      gap: 8px
    }

    #controls button {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      transition: all .25s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-card)
    }

    #controls button:hover {
      background: rgba(78, 205, 196, 0.08);
      color: var(--accent);
      border-color: var(--glass-border-hover);
      box-shadow: var(--shadow-card), var(--shadow-glow);
      transform: translateY(-1px)
    }

    #info-panel {
      position: fixed;
      top: 50%;
      left: 28px;
      transform: translateY(-50%);
      width: 360px;
      max-height: 72vh;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 28px;
      z-index: 100;
      -webkit-backdrop-filter: blur(40px);
      backdrop-filter: blur(40px);
      transition: all .4s cubic-bezier(.4, 0, .2, 1);
      opacity: 0;
      pointer-events: none;
      overflow-y: auto;
      box-shadow: var(--shadow-card), 0 0 60px rgba(78, 205, 196, 0.04)
    }

    #info-panel.visible {
      opacity: 1;
      pointer-events: auto
    }

    #info-panel .close {
      position: absolute;
      top: 16px;
      right: 20px;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-muted);
      transition: all .2s;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px
    }

    #info-panel .close:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05)
    }

    #info-panel .node-name {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 4px;
      letter-spacing: 1px
    }

    #info-panel .node-type {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 16px;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    #info-panel .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin: 3px 4px 3px 0;
      letter-spacing: 0.3px
    }

    #info-panel .section {
      margin-top: 18px
    }

    #info-panel .section-title {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 8px;
      font-weight: 700
    }

    #info-panel .desc {
      font-size: 13px;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-top: 8px;
      font-weight: 400
    }

    #info-panel .child-list {
      list-style: none
    }

    #info-panel .child-list li {
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: var(--radius-sm);
      font-size: 12px;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500
    }

    #info-panel .child-list li:hover {
      background: rgba(78, 205, 196, 0.06);
      transform: translateX(2px)
    }

    #info-panel .child-list .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px currentColor
    }

    #info-panel .child-list .status-icon {
      font-size: 10px;
      margin-left: auto;
      flex-shrink: 0
    }

    #info-panel .action-btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .25s;
      text-align: center;
      letter-spacing: 0.5px;
      font-family: inherit
    }

    #info-panel .action-btn.primary {
      background: linear-gradient(135deg, #4ecdc4, #45b7d1);
      color: #fff;
      box-shadow: 0 4px 20px rgba(78, 205, 196, 0.25)
    }

    #info-panel .action-btn.primary:hover {
      box-shadow: 0 6px 28px rgba(78, 205, 196, 0.4);
      transform: translateY(-2px)
    }

    #info-panel .action-btn.secondary {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-muted);
      border: 1px solid var(--glass-border)
    }

    #info-panel .action-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-secondary)
    }

    #info-panel .cross-domain {
      background: rgba(254, 202, 87, 0.04);
      border: 1px solid rgba(254, 202, 87, 0.08);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-top: 12px
    }

    #info-panel .cross-domain .cd-title {
      font-size: 10px;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    #info-panel .cross-domain .cd-item {
      font-size: 11px;
      color: var(--text-secondary);
      padding: 4px 0;
      cursor: pointer;
      transition: all .2s;
      font-weight: 500
    }

    #info-panel .cross-domain .cd-item:hover {
      color: var(--gold);
      transform: translateX(3px)
    }

    #tooltip {
      position: fixed;
      z-index: 200;
      background: var(--bg-card);
      border: 1px solid var(--glass-border-hover);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .15s;
      -webkit-backdrop-filter: blur(30px);
      backdrop-filter: blur(30px);
      max-width: 260px;
      box-shadow: var(--shadow-card), 0 0 20px rgba(78, 205, 196, 0.06)
    }

    #tooltip.visible {
      opacity: 1
    }

    #drill-hint {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: var(--bg-card);
      border: 1px solid var(--glass-border-hover);
      border-radius: var(--radius-sm);
      padding: 12px 28px;
      font-size: 13px;
      color: var(--accent);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      animation: hintPulse 2.5s ease-in-out infinite;
      pointer-events: none;
      transition: opacity 1s;
      font-weight: 500;
      letter-spacing: 0.5px;
      box-shadow: var(--shadow-glow)
    }

    @keyframes hintPulse {

      0%,
      100% {
        opacity: 0.5;
        transform: translateX(-50%) scale(0.98)
      }

      50% {
        opacity: 1;
        transform: translateX(-50%) scale(1)
      }
    }

    #chat-window {
      position: fixed;
      bottom: 28px;
      right: 88px;
      width: 460px;
      height: 540px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      z-index: 150;
      display: none;
      flex-direction: row;
      -webkit-backdrop-filter: blur(40px);
      backdrop-filter: blur(40px);
      overflow: hidden;
      box-shadow: var(--shadow-card), 0 0 40px rgba(78, 205, 196, 0.04)
    }

    #chat-window .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 255, 255, 0.04)
    }

    #chat-window .chat-sidebar {
      width: 110px;
      padding: 10px 8px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.01)
    }

    #kbd-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 90;
      font-size: 10px;
      color: #333;
      display: flex;
      gap: 16px;
      pointer-events: none
    }

    #kbd-hint kbd {
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid #222;
      background: rgba(255, 255, 255, 0.03);
      font-family: inherit;
      font-size: 10px
    }

    @media(max-width:768px) {
      #info-panel {
        left: 10px;
        right: 10px;
        width: auto;
        top: auto;
        bottom: 60px;
        transform: none;
        max-height: 40vh
      }

      #legend {
        display: none
      }

      #quick-start {
        display: none
      }

      #search-wrap {
        width: 160px
      }

      #kbd-hint {
        display: none
      }

      #header h1 {
        font-size: 16px
      }

      #chat-window {
        right: 10px;
        left: 10px;
        width: auto;
        bottom: 0;
        height: 60vh;
        border-radius: 16px 16px 0 0
      }

      #chat-window .chat-sidebar {
        display: none
      }
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>
  <div id="header">
    <div class="brand">
      <div class="brand-icon">🔮</div>
      <h1>宇宙魔方AI</h1><span class="sub">找到你的行业AI专家</span>
    </div>
    <div id="search-wrap">
      <span id="search-icon">🔍</span>
      <input id="search-input" type="text" placeholder="搜索行业、灵魂、工具..." autocomplete="off">
      <div id="search-results"></div>
    </div>
  </div>
  <div id="breadcrumb"></div>
  <div id="layer-info">
    <div class="layer-name" id="layer-name"></div>
    <div class="layer-hint" id="layer-hint"></div>
  </div>
  <div id="quick-start">
    <div class="qs-title">快速体验</div>
    <div class="qs-step" onclick="quickPath('IND_NRG')">
      <div class="qs-dot" style="background:#4ecdc4"></div>能源电力<span class="qs-badge ready">可用</span>
    </div>
    <div class="qs-step" onclick="openChat('S_EINSTEIN')">
      <div class="qs-dot" style="background:#ff9ff3"></div>爱因斯坦问答<span class="qs-badge ready">对话</span>
    </div>
    <div class="qs-step" onclick="quickPath('T_MATLAB')">
      <div class="qs-dot" style="background:#a29bfe"></div>MATLAB<span class="qs-badge ready">可用</span>
    </div>
    <div class="qs-step" onclick="quickPath('S_CEZANNE')">
      <div class="qs-dot" style="background:#feca57"></div>塞尚·软件开发<span class="qs-badge ready">Iter2</span>
    </div>
    <div class="qs-step">
      <div class="qs-dot" style="background:#555"></div>达芬奇·工程<span class="qs-badge soon">待训练</span>
    </div>
    <div class="qs-step">
      <div class="qs-dot" style="background:#555"></div>贝多芬·音乐<span class="qs-badge soon">待训练</span>
    </div>
  </div>
  <div id="legend">
    <div class="title">用户路径</div>
    <div class="row">
      <div class="dot" style="background:#feca57;color:#feca57"></div>你的需求
    </div>
    <div class="arrow">↓</div>

    function initStars() {
      stars = [];

    }

    function initNebulae() {

      }
    }

    function layoutRing() {
      if (!cur) return; cur.x = W / 2; cur.y = H / 2;
      const n = ring.length; if (n === 0) return;
      const rr = Math.max(160, Math.min(320, Math.min(W, H) * 0.26));
      ring.forEach((nd, i) => { const a = (i / n) * Math.PI * 2 - Math.PI / 2; nd.x = W / 2 + Math.cos(a) * rr; nd.y = H / 2 + Math.sin(a) * rr; });
    }

    var anim = null;

    function drillInto(id) {
      const nd = N[id]; if (!nd) return;
      const oldCur = cur;
      const oldRing = ring.slice();

      const newRing = gc(id);

      layoutRing();
      const targetPositions = ring.map(nd2 => ({ x: nd2.x, y: nd2.y }));
      const clickedOld = oldRing.find(r => r.id === id);
      const fromX = clickedOld ? clickedOld.x : W / 2;
      const fromY = clickedOld ? clickedOld.y : H / 2;
      ring.forEach((nd2, i) => { nd2.x = W / 2; nd2.y = H / 2; });
      cur.x = fromX; cur.y = fromY;

        cur.y = fromY + (H / 2 - fromY) * ep;

    function getR(nd, isC) {
      if (isC) return 48;

    function drawGlow(x, y, r, color, alpha) {

    function draw() {

          g.addColorStop(0.6, 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + (sa * 0.9) + ')');
          g.addColorStop(1, 'rgba(' + Math.floor(rgb.r * 0.4) + ',' + Math.floor(rgb.g * 0.4) + ',' + Math.floor(rgb.b * 0.4) + ',' + (sa * 0.6) + ')');

          }

          if (nd.s === 'active') {

          }

          if (nd.s === 'training') {
            var ta = now * 0.005;
            ctx.beginPath(); ctx.arc(nd.x + r * 0.65, nd.y - r * 0.65, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#feca57'; ctx.fill();
            ctx.shadowColor = '#feca57'; ctx.shadowBlur = 6; ctx.fill(); ctx.shadowBlur = 0;
            ctx.beginPath(); ctx.arc(nd.x, nd.y, r + 4, ta, ta + Math.PI * 0.5);
            ctx.strokeStyle = 'rgba(254,202,87,0.3)'; ctx.lineWidth = 1.5; ctx.stroke();
          }

          ctx.fillStyle = sa > 0.5 ? '#fff' : '#888';
          ctx.font = 'bold ' + (nd.n.length > 4 ? '10' : '11') + 'px "Microsoft YaHei",sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          var nm = nd.n.length > 6 ? nd.n.slice(0, 6) + '..' : nd.n;
          ctx.fillText(nm, nd.x, nd.y + (nd.s === 'locked' ? r * 0.2 : 0));
        });

        ctx.beginPath(); ctx.arc(cur.x, cur.y, cr + 6, 0, Math.PI * 2);
        ctx.strokeStyle = cur.c + '30'; ctx.lineWidth = 1; ctx.stroke();

        var orbitAngle = now * 0.001;
        ctx.beginPath(); ctx.arc(cur.x, cur.y, cr + 12, orbitAngle, orbitAngle + Math.PI * 0.6);
        ctx.strokeStyle = cur.c + '25'; ctx.lineWidth = 2; ctx.stroke();
        ctx.beginPath(); ctx.arc(cur.x, cur.y, cr + 12, orbitAngle + Math.PI, orbitAngle + Math.PI * 1.6);
        ctx.strokeStyle = cur.c + '15'; ctx.lineWidth = 1.5; ctx.stroke();

        ctx.beginPath(); ctx.arc(cur.x, cur.y, cr, 0, Math.PI * 2);
        var cg = ctx.createRadialGradient(cur.x - cr * 0.3, cur.y - cr * 0.3, 0, cur.x, cur.y, cr);

        cg.addColorStop(0, 'rgba(' + Math.min(255, curRgb.r + 80) + ',' + Math.min(255, curRgb.g + 80) + ',' + Math.min(255, curRgb.b + 80) + ',1)');
        cg.addColorStop(0.5, cur.c);
        cg.addColorStop(1, 'rgba(' + Math.floor(curRgb.r * 0.5) + ',' + Math.floor(curRgb.g * 0.5) + ',' + Math.floor(curRgb.b * 0.5) + ',0.7)');
        ctx.fillStyle = cg; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2.5; ctx.stroke();

        ctx.fillStyle = '#fff'; ctx.font = 'bold 13px "Microsoft YaHei",sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        var cn = cur.n.length > 8 ? cur.n.slice(0, 8) + '..' : cur.n;
        ctx.fillText(cn, cur.x, cur.y - 7);
        ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '10px "Microsoft YaHei",sans-serif';
        ctx.fillText(TL[cur.t] || '', cur.x, cur.y + 11);
      }

      ctx.restore(); requestAnimationFrame(draw);
    }

    function findNode(mx, my) {
      const x = (mx - transform.x) / transform.k; const y = (my - transform.y) / transform.k;
      let closest = null, minD = Infinity;
      if (cur) { const d = Math.hypot(cur.x - x, cur.y - y); if (d < getR(cur, true) + 5) { closest = { ...cur, isCenter: true, layerIdx: -1 }; minD = d; } }
      ring.forEach(nd => { const d = Math.hypot(nd.x - x, nd.y - y); const r = getR(nd, false) + 5; if (d < r && d < minD) { closest = { ...nd, isCenter: false, layerIdx: -1 }; minD = d; } });
      var depth = path.length;
      var vanishX = W * 0.82;
      var vanishY = H * 0.18;
      for (var li = 0; li < depth; li++) {
        var pn = path[li];
        var layerDepth = depth - li;
        var sc = Math.pow(1.25, layerDepth);
        var al = Math.pow(0.3, layerDepth);
        if (al < 0.03) continue;
        var shift = Math.min(1, 0.15 * layerDepth);
        var cx = cur.x + (vanishX - cur.x) * shift;
        var cy = cur.y + (vanishY - cur.y) * shift;
        var pcr = getR(pn, true) * sc;
        var d = Math.hypot(cx - x, cy - y);
        if (d < pcr + 5 && d < minD) { closest = { ...pn, isCenter: true, layerIdx: li }; minD = d; }
      }
      return closest;
    }

    function showInfo(nd) {
      if (!nd) return;
      const p = document.getElementById('info-panel'); const c = document.getElementById('panel-content');
      let h = '<div class="node-name" style="color:' + nd.c + '">' + nd.n + '</div>';
      h += '<div class="node-type">' + (TL[nd.t] || nd.t) + '</div>';
      const sl = SL[nd.s] || nd.s; const sc = SC[nd.s] || '#555';
      h += '<div class="tag" style="background:' + sc + '22;color:' + sc + '">' + sl + '</div>';
      if (nd.expert) h += '<div class="tag" style="background:' + nd.c + '22;color:' + nd.c + '">' + nd.expert + '</div>';
      if (nd.tier) h += '<div class="tag" style="background:rgba(255,255,255,0.04);color:#666">Tier ' + nd.tier + '</div>';
      if (nd.status) h += '<div class="tag" style="background:rgba(254,202,87,0.1);color:#feca57">' + nd.status + '</div>';
      if (nd.domain) {
        var dpid = gp(nd.id);
        h += '<div class="tag" style="background:rgba(78,205,196,0.1);color:#4ecdc4;cursor:pointer" onclick="goToParent(\'' + (dpid || '') + '\')">' + nd.domain + ' ›</div>';
      }
      if (nd.price) h += '<div class="tag" style="background:rgba(254,202,87,0.1);color:#feca57">' + nd.price + '</div>';
      if (nd.city) h += '<div class="tag" style="background:rgba(0,210,255,0.1);color:#00d2ff">' + nd.city + '</div>';
      if (nd.cat) h += '<div class="tag" style="background:rgba(162,155,254,0.1);color:#a29bfe">' + nd.cat + '</div>';
      if (nd.pop) h += '<div class="tag" style="background:rgba(254,202,87,0.1);color:#feca57">Pop:' + nd.pop + '</div>';
      if (nd.d) h += '<div class="desc">' + nd.d + '</div>';
      if (nd.focus) h += '<div class="section"><div class="section-title">专注领域</div><div class="desc">' + nd.focus + '</div></div>';
      if (nd.hot) { h += '<div class="section"><div class="section-title">热门模板</div><ul class="child-list">'; nd.hot.forEach(t => { h += '<li><span style="color:#ff6b6b;font-size:10px">🔥</span>' + t + '</li>'; }); h += '</ul></div>'; }

      if (nd.t === 'soul') {
        h += '<div class="section" style="margin-top:8px">';
        if (nd.s === 'active' || nd.s === 'training') {
          h += '<button class="action-btn primary" style="margin-bottom:8px" onclick="openChat(\'' + nd.id + '\')">💬 开始问答</button>';
        } else {
          h += '<button class="action-btn secondary" style="margin-bottom:8px" onclick="alert(\'该灵魂模型尚未训练完成，敬请期待\')">🔒 敬请期待</button>';
        }
        var toolCh = gc(nd.id);
        if (toolCh.length > 0) {
          h += '<button class="action-btn primary" style="background:linear-gradient(135deg,#a29bfe,#6c5ce7)" onclick="drillInto(\'' + nd.id + '\')">🔧 展开技能 (' + toolCh.length + '个工具)</button>';
        }
        h += '</div>';
        if (toolCh.length > 0) {
          h += '<div class="section"><div class="section-title">工具链</div><ul class="child-list">';
          toolCh.forEach(t2 => { var tsc = SC[t2.s] || '#555'; h += '<li onclick="drillInto(\'' + nd.id + '\')"><div class="dot" style="background:' + t2.c + '"></div>' + t2.n + '<span class="status-icon" style="color:' + tsc + '">' + (t2.s === 'active' ? '✓' : '🔒') + '</span></li>'; });
          h += '</ul></div>';
        }
        if (nd.cross && nd.cross.length > 0) {
          h += '<div class="cross-domain"><div class="cd-title">跨领域协作</div>';
          nd.cross.forEach(cid => { var cs = N[cid]; if (cs) { h += '<div class="cd-item" onclick="handleCrossDomain(\'' + cid + '\')">' + cs.n + ' · ' + cs.expert + (cs.s === 'active' || cs.s === 'training' ? ' ✓' : ' 🔒 需安装') + '</div>'; } });
          h += '</div>';
        }
        var spid = gp(nd.id);
        if (spid && N[spid]) {
          var spn = N[spid];
          h += '<div class="section"><div class="section-title">所属行业</div><ul class="child-list">';
          h += '<li onclick="goToParent(\'' + spid + '\')"><div class="dot" style="background:' + spn.c + '"></div>' + spn.n + '<span class="status-icon" style="color:#4ecdc4">›</span></li>';
          h += '</ul></div>';
        }
        c.innerHTML = h; p.classList.add('visible'); return;
      }

      const pid = gp(nd.id);
      if (pid && N[pid]) { const pn = N[pid]; h += '<div class="section"><div class="section-title">上级节点</div><ul class="child-list"><li onclick="drillInto(\'' + pid + '\')"><div class="dot" style="background:' + pn.c + '"></div>' + pn.n + '</li></ul></div>'; }
      const ch = gc(nd.id);
      if (ch.length > 0) { h += '<div class="section"><div class="section-title">下级节点 (' + ch.length + ')</div><ul class="child-list">'; ch.forEach(c2 => { const csc = SC[c2.s] || '#555'; h += '<li onclick="drillInto(\'' + c2.id + '\')"><div class="dot" style="background:' + c2.c + '"></div>' + c2.n + '<span class="status-icon" style="color:' + csc + '">' + (c2.s === 'active' ? '✓' : c2.s === 'training' ? '⏳' : '🔒') + '</span></li>'; }); h += '</ul></div>'; }
      if (nd.s === 'active' && ch.length > 0) { h += '<button class="action-btn primary" onclick="drillInto(\'' + nd.id + '\')">展开下级 (' + ch.length + ')</button>'; }
      else if (nd.s === 'locked') { h += '<button class="action-btn secondary" onclick="alert(\'该功能正在规划中，敬请期待\')">敬请期待</button>'; }
      c.innerHTML = h; p.classList.add('visible');
    }

    function goToParent(parentId) {
      if (!parentId || !N[parentId]) return;
      for (var i = path.length - 1; i >= 0; i--) {
        if (path[i].id === parentId) { drillTo(i); return; }
      }
      drillBack();
    }

    function handleCrossDomain(soulId) {
      var cs = N[soulId]; if (!cs) return;
      if (cs.s === 'active' || cs.s === 'training') { openChat(soulId); }
      else { alert('跨领域需要安装「' + cs.n + '」灵魂模块\n\n' + cs.expert + '\n\n该灵魂尚未训练完成，训练完成后可在私有工作站中安装。'); }
    }

    var chatSoul = null;

    function openChat(soulId) {
      var s = N[soulId]; if (!s) return;
      chatSoul = { ...s, id: soulId };
      var cw = document.getElementById('chat-window'); cw.style.display = 'flex';
      document.getElementById('chat-title').textContent = s.n + ' · 问答';
      document.getElementById('chat-soul-dot').style.background = s.c;
      var msgs = document.getElementById('chat-messages'); msgs.innerHTML = '';
      addChatMsg('system', '已连接 ' + s.n);
      addChatMsg('ai', '你好！我是' + s.n + '，擅长' + s.expert + '。请问有什么可以帮你的？');
      var toolList = document.getElementById('chat-tools');
      var tools = gc(soulId);
      if (tools.length > 0) {
        toolList.innerHTML = '<div style="font-size:11px;color:#555;margin-bottom:6px">相关工具</div>';
        tools.forEach(function (t2) { toolList.innerHTML += '<div style="padding:4px 8px;margin:2px 0;border-radius:6px;font-size:11px;cursor:pointer;color:' + (t2.s === 'active' ? '#a29bfe' : '#444') + ';transition:background .2s" onmouseover="this.style.background=\'rgba(255,255,255,0.04)\'" onmouseout="this.style.background=\'transparent\'" onclick="drillInto(\'' + t2.id + '\')">' + (t2.s === 'active' ? '✓' : '🔒') + ' ' + t2.n + '</div>'; });
      } else { toolList.innerHTML = ''; }
    }

    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

    function addChatMsg(role, text) {
      var msgs = document.getElementById('chat-messages'); var div = document.createElement('div');
      div.style.cssText = role === 'system' ? 'text-align:center;font-size:11px;color:#444;padding:4px 0' : role === 'ai' ? 'background:rgba(78,205,196,0.08);border-radius:12px;padding:10px 14px;font-size:13px;line-height:1.7;color:#bbb;align-self:flex-start;max-width:85%' : 'background:rgba(255,255,255,0.04);border-radius:12px;padding:10px 14px;font-size:13px;line-height:1.7;color:#e0e0e0;align-self:flex-end;max-width:85%';
      div.textContent = text; msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
    }

    function sendChat() {
      var input = document.getElementById('chat-input'); var text = input.value.trim(); if (!text) return;
      addChatMsg('user', text); input.value = '';
      if (chatSoul && (chatSoul.s === 'active' || chatSoul.s === 'training')) {
        addChatMsg('ai', '[演示模式] 收到: "' + text + '"\n\n完整回答需要连接Ollama推理服务，当前为前端演示。后端API搭建后即可实时对话。');
      } else {
        addChatMsg('ai', '[敬请期待] 该灵魂模型尚未训练完成，对话功能将在训练完成后开放。');
      }
    }

    function startVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { alert('当前浏览器不支持语音输入，请使用Chrome或Edge'); return; }
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition; var rec = new SR();
      rec.lang = 'zh-CN'; rec.continuous = false; rec.interimResults = false;
      var btn = document.getElementById('voice-btn');
      btn.style.background = 'rgba(255,107,107,0.2)'; btn.style.borderColor = '#ff6b6b'; btn.style.color = '#ff6b6b';
      rec.onresult = function (e) { var txt = e.results[0][0].transcript; document.getElementById('chat-input').value = txt; btn.style.background = 'rgba(78,205,196,0.06)'; btn.style.borderColor = 'rgba(78,205,196,0.2)'; btn.style.color = '#4ecdc4'; sendChat(); };
      rec.onerror = function () { btn.style.background = 'rgba(78,205,196,0.06)'; btn.style.borderColor = 'rgba(78,205,196,0.2)'; btn.style.color = '#4ecdc4'; };
      rec.onend = function () { btn.style.background = 'rgba(78,205,196,0.06)'; btn.style.borderColor = 'rgba(78,205,196,0.2)'; btn.style.color = '#4ecdc4'; };
      rec.start();
    }

    // === SEARCH ===
    var searchInput = document.getElementById('search-input');
    var searchResults = document.getElementById('search-results');

    function searchNodes(query) {
      if (!query || query.length < 1) { searchResults.classList.remove('visible'); return; }
      var q = query.toLowerCase();
      var results = [];
      Object.entries(N).forEach(function ([id, nd]) {
        var score = 0;
        if (nd.n.toLowerCase().includes(q)) score += 10;
        if (nd.d && nd.d.toLowerCase().includes(q)) score += 3;
        if (nd.expert && nd.expert.toLowerCase().includes(q)) score += 5;
        if (nd.cat && nd.cat.toLowerCase().includes(q)) score += 4;
        if (nd.domain && nd.domain.toLowerCase().includes(q)) score += 3;
        if (TL[nd.t] && TL[nd.t].toLowerCase().includes(q)) score += 2;
        if (nd.hot) nd.hot.forEach(function (h) { if (h.toLowerCase().includes(q)) score += 2; });
        if (score > 0) results.push({ id: id, ...nd, score: score });
      });
      results.sort(function (a, b) { return b.score - a.score; });
      return results.slice(0, 12);
    }

    function renderSearchResults(results) {
      if (!results || results.length === 0) { searchResults.classList.remove('visible'); return; }
      var html = '';
      results.forEach(function (nd) {
        var sl = SL[nd.s] || nd.s;
        var sc = SC[nd.s] || '#555';
        html += '<div class="sr-item" onclick="navigateToNode(\'' + nd.id + '\')">';
        html += '<div class="sr-dot" style="background:' + nd.c + ';box-shadow:0 0 6px ' + nd.c + '"></div>';
        html += '<span class="sr-name">' + nd.n + '</span>';
        html += '<span class="sr-type">' + (TL[nd.t] || '') + '</span>';
        html += '<span class="sr-status" style="background:' + sc + '15;color:' + sc + '">' + sl + '</span>';
        html += '</div>';
      });
      searchResults.innerHTML = html;
      searchResults.classList.add('visible');
    }

    function navigateToNode(id) {
      searchInput.value = '';
      searchResults.classList.remove('visible');
      searchInput.blur();

      var nodePath = [];
      var curId = id;
      while (PARENT[curId]) {
        nodePath.unshift(curId);
        curId = PARENT[curId];
      }
      nodePath.unshift(curId);

      goRoot();
      for (var i = 1; i < nodePath.length; i++) {
        drillInto(nodePath[i]);
      }

      var nd = N[id];
      if (nd) {
        setTimeout(function () { showInfo({ id: id, ...nd }); }, 700);
      }
    }

    searchInput.addEventListener('input', function () {
      var results = searchNodes(this.value);
      renderSearchResults(results);
    });

    searchInput.addEventListener('focus', function () {
      if (this.value.length > 0) {
        var results = searchNodes(this.value);
        renderSearchResults(results);
      }
    });

    document.addEventListener('click', function (e) {
      if (!e.target.closest('#search-wrap')) {
        searchResults.classList.remove('visible');
      }
    });

    // === KEYBOARD ===
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        if (searchResults.classList.contains('visible')) {
          searchResults.classList.remove('visible');
          searchInput.blur();
          return;
        }
        if (document.getElementById('chat-window').style.display === 'flex') {
          closeChat(); return;
        }
        if (document.getElementById('info-panel').classList.contains('visible')) {
          document.getElementById('info-panel').classList.remove('visible'); return;
        }
        drillBack();
      }
      if (e.key === '/' && document.activeElement !== searchInput && document.activeElement !== document.getElementById('chat-input')) {
        e.preventDefault();
        searchInput.focus();
      }
    });

    // === MOUSE/TOUCH ===
    canvas.addEventListener('mousemove', e => {
      const nd = findNode(e.clientX, e.clientY); hovered = nd; canvas.style.cursor = nd ? 'pointer' : 'grab';
      const tip = document.getElementById('tooltip');
      if (nd) {
        let tt = '<div style="color:' + nd.c + ';font-weight:700;font-size:13px">' + nd.n + '</div>';
        if (nd.expert) tt += '<div style="color:#888;font-size:11px;margin-top:2px">' + nd.expert + '</div>';
        if (nd.cat) tt += '<div style="color:#888;font-size:11px;margin-top:1px">' + nd.cat + '</div>';
        const sl = SL[nd.s] || nd.s; const sc = SC[nd.s] || '#555';
        tt += '<div style="color:' + sc + ';font-size:10px;margin-top:3px">' + sl + '</div>';
        if (nd.layerIdx !== undefined && nd.layerIdx >= 0) {
          tt += '<div style="color:#4ecdc4;font-size:10px;margin-top:2px">点击返回该层</div>';
        } else if (!nd.isCenter) {
          if (nd.t === 'soul') tt += '<div style="color:#555;font-size:10px;margin-top:2px">点击查看问答入口</div>';
          else if (nd.t === 'industry') tt += '<div style="color:#555;font-size:10px;margin-top:2px">点击进入该行业</div>';
          else { const ch = gc(nd.id); if (ch.length > 0) tt += '<div style="color:#555;font-size:10px;margin-top:2px">点击展开 ' + ch.length + ' 个下级</div>'; else tt += '<div style="color:#555;font-size:10px;margin-top:2px">点击查看详情</div>'; }
        } else { tt += '<div style="color:#555;font-size:10px;margin-top:2px">点击查看详情</div>'; }
        tip.innerHTML = tt;
        var tx = e.clientX + 16; var ty = e.clientY - 10;
        if (tx + 240 > W) tx = e.clientX - 250;
        if (ty + 100 > H) ty = e.clientY - 100;
        tip.style.left = tx + 'px'; tip.style.top = ty + 'px';
        tip.classList.add('visible');
      } else { tip.classList.remove('visible'); }
    });

    canvas.addEventListener('click', e => {
      const nd = findNode(e.clientX, e.clientY);
      if (nd) { e.stopPropagation(); }
      if (!nd) { document.getElementById('info-panel').classList.remove('visible'); return; }
      if (nd.layerIdx !== undefined && nd.layerIdx >= 0) { drillTo(nd.layerIdx); return; }
      if (nd.t === 'soul') { showInfo(nd); }
      else if (nd.isCenter) { showInfo(nd); }
      else if (nd.t === 'industry' || nd.t === 'need') { drillInto(nd.id); }
      else { const ch = gc(nd.id); if (ch.length > 0) { drillInto(nd.id); } else { showInfo(nd); } }
    });

    var touchStart = null; var touchMoved = false;
    canvas.addEventListener('touchstart', e => { if (e.touches.length === 1) { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; touchMoved = false; } }, { passive: true });
    canvas.addEventListener('touchmove', () => { touchMoved = true; }, { passive: true });
    canvas.addEventListener('touchend', e => {
      if (!touchMoved && touchStart) {
        var nd = findNode(touchStart.x, touchStart.y);
        if (!nd) { document.getElementById('info-panel').classList.remove('visible'); return; }
        if (nd.layerIdx !== undefined && nd.layerIdx >= 0) { drillTo(nd.layerIdx); return; }
        if (nd.t === 'soul') { showInfo(nd); }
        else if (nd.isCenter) { showInfo(nd); }
        else if (nd.t === 'industry' || nd.t === 'need') { drillInto(nd.id); }
        else { const ch = gc(nd.id); if (ch.length > 0) { drillInto(nd.id); } else { showInfo(nd); } }
      }
      touchStart = null;
    }, { passive: true });

    document.getElementById('panel-close').addEventListener('click', () => { document.getElementById('info-panel').classList.remove('visible'); });

    const zoom = d3.zoom().scaleExtent([0.3, 4]).touchable(() => ('ontouchstart' in window ? 'touch' : null)).filter(e => { if (e.type === 'dblclick') return false; return true; }).on('zoom', e => { transform = e.transform; });
    d3.select(canvas).call(zoom).on('touchstart.zoom', null);

    document.getElementById('btn-fit').addEventListener('click', () => { d3.select(canvas).transition().duration(500).call(zoom.transform, d3.zoomIdentity); });
    document.getElementById('btn-zin').addEventListener('click', () => { d3.select(canvas).transition().duration(300).call(zoom.scaleBy, 1.3); });
    document.getElementById('btn-zout').addEventListener('click', () => { d3.select(canvas).transition().duration(300).call(zoom.scaleBy, 0.7); });
    document.getElementById('btn-back').addEventListener('click', drillBack);

    window.addEventListener('resize', () => { resize(); initStars(); initNebulae(); layoutRing(); initParticles(); });

    resize(); initStars(); initNebulae();
    cur = { id: 'NEED', ...N.NEED, x: W / 2, y: H / 2 }; ring = gc('NEED');
    layoutRing(); initParticles(); updateBC(); updateLI(); draw();
    setTimeout(() => { document.getElementById('drill-hint').style.opacity = '0'; }, 6000);
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      var vb = document.getElementById('voice-btn'); if (vb) vb.style.display = 'block';
    }
  </script>
</body>
