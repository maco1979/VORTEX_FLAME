<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="魔方AI">
  <link rel="manifest" href="manifest.json">
  <title>宇宙魔方AI · 找到你的AI专家</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-deep: #0a0a1a;
      --bg-card: rgba(15, 15, 35, 0.95);
      --glass: rgba(20, 20, 50, 0.8);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-hover: rgba(78, 205, 196, 0.3);
      --accent: #00ffcc;
      --accent2: #9c88ff;
      --accent3: #ff6b9d;
      --primary-btn: linear-gradient(135deg, #4ecdc4, #45b7d1);
      --btn-on-dark: linear-gradient(135deg, rgba(78, 205, 196, 0.16), rgba(69, 183, 209, 0.12));
      --glass-elev: rgba(255, 255, 255, 0.03);
      --muted-ink: rgba(220, 235, 255, 0.12);
      --gold: #ffd93d;
      --text-primary: #ffffff;
      --text-secondary: #b8c5d6;
      --text-muted: #6c7b95;
      --radius: 20px;
      --radius-sm: 12px;
      --shadow-glow: 0 0 40px rgba(0, 255, 204, 0.1);
      --shadow-card: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 2px rgba(255, 255, 255, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none
    }

    /* Common UI components */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid transparent;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
      user-select: none;
    }

    .btn-primary {
      background: var(--primary-btn);
      color: #04202a;
      box-shadow: 0 8px 30px rgba(78, 205, 196, 0.18);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--muted-ink);
      color: var(--text-secondary);
      box-shadow: none;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .muted-link {
      color: var(--text-secondary);
      text-decoration: none;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.02);
    }

    /* Subtle card float for premium feel */
    .card-animate {
      animation: cardFloat 6s ease-in-out infinite;
    }

    @keyframes cardFloat {
      0% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }

      100% {
        transform: translateY(0);
      }
    }

    /* Design system: typography, spacing, palette */
    :root {
      --brand-1: #4ecdc4;
      /* teal */
      --brand-2: #45b7d1;
      /* cyan */
      --brand-3: #9c88ff;
      /* violet */
      --accent-strong: #00ffd1;
      --neutral-900: #04060a;
      --neutral-800: #0b1220;
      --surface-1: rgba(12, 18, 34, 0.96);
      --glass-1: rgba(255, 255, 255, 0.03);
      --muted-1: rgba(190, 205, 225, 0.12);
      --success: #4ecdc4;
      --danger: #ff6b6b;
      --info: #9c88ff;

      --font-sans: 'Inter', system-ui, -apple-system, 'Noto Sans SC', sans-serif;
      --type-xxl: 40px;
      --type-xl: 28px;
      --type-lg: 18px;
      --type-md: 14px;
      --type-sm: 12px;

      --space-xs: 6px;
      --space-sm: 12px;
      --space-md: 20px;
      --space-lg: 28px;
      --space-xl: 40px;
    }

    /* Typography utility */
    h1,
    .display-1 {
      font-family: var(--font-sans);
      font-weight: 900;
      color: #eef8ff
    }

    h1.display-1 {
      font-size: var(--type-xl);
      letter-spacing: -0.02em
    }

    /* Hero cards and badges */
    .hero-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: var(--space-sm);
    }

    .qs-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      color: #04202a;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      box-shadow: 0 8px 26px rgba(78, 205, 196, 0.14);
      margin-left: 8px;
    }

    .qs-badge.soon {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-secondary);
      font-weight: 700
    }

    .qs-step.btn {
      justify-content: flex-start;
      text-align: left;
    }

    /* Legend dots refined */
    #legend .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    /* Controls spacing */
    .control-btn {
      width: 46px;
      height: 46px;
      border-radius: 14px
    }

    body {
      background: linear-gradient(180deg, #05070f 0%, #070b16 45%, #050914 100%);
      overflow: hidden;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      touch-action: manipulation;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.3s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    #bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background:
        radial-gradient(circle at 20% 50%, rgba(0, 255, 204, 0.14) 0%, transparent 43%),
        radial-gradient(circle at 82% 18%, rgba(156, 136, 255, 0.16) 0%, transparent 44%),
        radial-gradient(circle at 38% 82%, rgba(255, 159, 243, 0.14) 0%, transparent 42%),
        linear-gradient(180deg, rgba(3, 8, 23, 0.95) 0%, rgba(7, 11, 28, 1) 100%);
      animation: bgFloat 20s ease-in-out infinite;
      filter: blur(0.5px);
    }

    @keyframes bgFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
        opacity: 0.3;
      }

      33% {
        transform: translate(10px, -10px) scale(1.05);
        opacity: 0.5;
      }

      66% {
        transform: translate(-10px, 10px) scale(0.95);
        opacity: 0.4;
      }
    }

    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    #particles::before,
    #particles::after {
      content: '';
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(0, 255, 204, 0.6);
      border-radius: 50%;
      animation: particleMove 10s linear infinite;
    }

    /* Deployment status & log */
    .deploy-status {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .deploy-log {
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
      color: var(--text-secondary);
      font-size: 13px;
      max-height: 220px;
      overflow: auto;
    }

    .deploy-log a {
      color: var(--accent-strong);
      text-decoration: underline;
    }

    #particles::before {
      top: 20%;
      left: 10%;
      animation-delay: 0s;
    }

    #particles::after {
      top: 70%;
      left: 80%;
      animation-delay: 5s;
      background: rgba(156, 136, 255, 0.6);
    }

    @keyframes particleMove {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translate(100px, -100px) scale(0.5);
        opacity: 0;
      }
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
      z-index: 1
    }

    #canvas:active {
      cursor: grabbing
    }

    #header {
      position: fixed;
      top: 28px;
      left: 28px;
      z-index: 100;
      width: 460px;
      max-width: calc(100vw - 56px);
      border-radius: 32px;
      padding: 24px;
      background: rgba(9, 18, 42, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      -webkit-backdrop-filter: blur(34px);
      backdrop-filter: blur(34px);
      box-shadow: 0 40px 120px rgba(2, 10, 30, 0.45), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      pointer-events: auto;
      display: grid;
      gap: 18px;
      transition: all .3s ease
    }

    #header.collapsed {
      width: auto;
      padding: 12px 16px;
      gap: 0;
      cursor: pointer
    }

    #header.collapsed #search-wrap,
    #header.collapsed #hero-panel,
    #header.collapsed .header-cta,
    #header.collapsed #breadcrumb,
    #header.collapsed #layer-info {
      display: none
    }

    #header.collapsed .brand {
      margin: 0
    }

    #header.collapsed .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      font-size: 14px
    }

    #header.collapsed h1 {
      font-size: 16px
    }

    #header.collapsed .sub {
      display: none
    }

    #header .brand {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .brand-info {
      display: grid;
      gap: 6px;
    }

    #header .brand-icon {
      width: 56px;
      height: 56px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(78, 205, 196, 0.18), rgba(69, 183, 209, 0.14));
      display: grid;
      place-items: center;
      font-size: 18px;
      color: #4ecdc4;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    #header h1 {
      font-size: 24px;
      font-weight: 900;
      color: #edf6ff;
      letter-spacing: -0.03em;
      margin: 0;
    }

    @keyframes brandShift {

      0%,
      100% {
        background-position: 0% 50%
      }

      50% {
        background-position: 100% 50%
      }
    }

    #header .sub {
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      line-height: 1.5;
      margin: 0;
    }

    #search-wrap {
      position: relative;
      width: 100%;
      max-width: 100%;
    }

    #hero-panel {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .hero-card {
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.12);
      min-height: 124px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform .25s ease, background .25s ease, border-color .25s ease;
    }

    .hero-card:hover {
      transform: translateY(-3px);
      background: rgba(78, 205, 196, 0.08);
      border-color: rgba(78, 205, 196, 0.16);
    }

    .hero-card .card-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .hero-card .card-headline {
      font-size: 16px;
      font-weight: 700;
      color: #edf6ff;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .hero-card .card-copy {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    /* Header CTA */
    .header-cta {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 6px;
    }

    .header-cta .btn {
      padding: 10px 16px;
      border-radius: 14px;
    }

    /* Chat input styling unified */
    .chat-input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      color: #eef8ff;
      font-size: 13px;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
      transition: box-shadow .12s ease, border-color .12s ease;
    }

    .chat-input:focus {
      box-shadow: 0 6px 24px rgba(78, 205, 196, 0.08);
      border-color: rgba(78, 205, 196, 0.22);
    }

    #search-input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border-radius: 28px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
      -webkit-backdrop-filter: blur(24px);
      backdrop-filter: blur(24px);
      transition: all .3s;
      letter-spacing: 0.5px
    }

    #search-input::placeholder {
      color: var(--text-muted);
      font-weight: 300
    }

    #search-input:focus {
      border-color: var(--glass-border-hover);
      background: rgba(15, 15, 40, 0.85);
      box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.06), var(--shadow-glow)
    }

    #search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none
    }

    #search-results {
      position: absolute;
      top: 50px;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--glass-border-hover);
      border-radius: var(--radius);
      max-height: 400px;
      overflow-y: auto;
      display: none;
      -webkit-backdrop-filter: blur(30px);
      backdrop-filter: blur(30px);
      box-shadow: var(--shadow-card), 0 0 40px rgba(78, 205, 196, 0.05)
    }

    #search-results.visible {
      display: block
    }

    .sr-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background .15s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03)
    }

    .sr-item:last-child {
      border-bottom: none
    }

    .sr-item:hover {
      background: rgba(78, 205, 196, 0.08)
    }

    .sr-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .sr-name {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0
    }

    .sr-type {
      font-size: 10px;
      color: #666;
      margin-left: auto
    }

    .sr-status {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px
    }

    #breadcrumb {
      position: relative;
      top: auto;
      left: auto;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      pointer-events: auto;
      flex-wrap: wrap;
      font-weight: 500;
      padding-top: 8px;
      margin-top: 4px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    #breadcrumb span {
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.02);
    }

    #breadcrumb span:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.08);
    }

    #breadcrumb span.active {
      color: var(--accent);
      cursor: default;
      background: rgba(78, 205, 196, 0.08);
    }

    #breadcrumb .sep {
      color: #999;
      font-size: 10px;
      padding: 0;
      cursor: default;
    }

    #breadcrumb .sep:hover {
      background: transparent;
      color: #999;
    }

    #layer-info {
      position: relative;
      top: auto;
      right: auto;
      z-index: 1;
      text-align: left;
      pointer-events: auto;
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #layer-info .layer-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #edf6ff;
    }

    #layer-info .layer-hint {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    #quick-start {
      position: fixed;
      top: 160px;
      right: 28px;
      z-index: 100;
      background: rgba(8, 14, 30, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 22px;
      width: 240px;
      max-height: calc(100vh - 180px);
      overflow: hidden;
      -webkit-backdrop-filter: blur(32px);
      backdrop-filter: blur(32px);
      box-shadow: 0 28px 80px rgba(2, 10, 30, 0.45), inset 0 0 1px rgba(255, 255, 255, 0.04);
      pointer-events: auto;
      transition: all .3s ease
    }

    #quick-start.collapsed {
      width: 46px;
      height: 46px;
      padding: 0;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer
    }

    #quick-start.collapsed .qs-title,
    #quick-start.collapsed .qs-step {
      display: none
    }

    #quick-start.collapsed::after {
      content: '⚡';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px
    }

    #quick-start::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(78, 205, 196, 0.12), transparent 55%);
      pointer-events: none;
    }

    #quick-start .qs-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 18px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      opacity: 0.85;
    }

    #quick-start .qs-step {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
      font-size: 12px;
      cursor: pointer;
      padding: 12px 14px;
      border-radius: 18px;
      transition: all .25s ease;
      font-weight: 600;
      letter-spacing: 0.2px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
    }

    #quick-start .qs-step:hover {
      background: rgba(78, 205, 196, 0.08);
      border-color: rgba(78, 205, 196, 0.16);
      transform: translateX(-2px);
    }

    #quick-start .qs-step .qs-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 12px currentColor;
    }

    #quick-start .qs-step .qs-badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      margin-left: auto;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    #quick-start .qs-step .qs-badge.ready {
      background: rgba(78, 205, 196, 0.14);
      color: var(--accent);
    }

    #quick-start .qs-step .qs-badge.soon {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
    }

    #legend {
      position: fixed;
      bottom: 28px;
      left: 28px;
      z-index: 100;
      background: rgba(11, 17, 38, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 18px 22px;
      width: 248px;
      font-size: 12px;
      -webkit-backdrop-filter: blur(32px);
      backdrop-filter: blur(32px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35), inset 0 0 1px rgba(255, 255, 255, 0.04);
      pointer-events: auto;
      transition: all .3s ease
    }

    #legend.collapsed {
      width: 46px;
      height: 46px;
      padding: 0;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer
    }

    #legend.collapsed .title,
    #legend.collapsed .row,
    #legend.collapsed .arrow,
    #legend.collapsed .status-row {
      display: none
    }

    #legend.collapsed::after {
      content: '🗺️';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px
    }

    #legend .title {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #legend .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0;
      font-weight: 500;
      color: #d8e5ff;
      line-height: 1.5;
    }

    #legend .row:not(:last-child) {
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    #legend .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 10px currentColor;
      flex-shrink: 0;
    }

    #legend .arrow {

    const SL = { active: "可用", training: "训练中", locked: "待训练" };
    const SC = { active: "#4ecdc4", training: "#feca57", locked: "#444" };

    function gc(id) { return (TREE[id] || []).map(cid => { const nd = N[cid]; return nd ? { id: cid, ...nd } : null; }).filter(Boolean); }
    function gp(id) { return PARENT[id] || null; }

    function escapeHtml(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H, dpr;
    let transform = d3.zoomIdentity;
    let cur = null;
    let ring = [];
    let path = [];
    let hovered = null;
    let particles = [];
    let stars = [];
    let nebulae = [];
    let frameCount = 0;

    function resize() { dpr = window.devicePixelRatio || 1; W = window.innerWidth; H = window.innerHeight; canvas.width = W * dpr; canvas.height = H * dpr; canvas.style.width = W + 'px'; canvas.style.height = H + 'px'; ctx.setTransform(dpr, 0, 0, dpr, 0, 0); }

    function initStars() {
      stars = [];
      for (let i = 0; i < 300; i++) stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.5 + 0.2, a: Math.random() * 0.6 + 0.1, s: Math.random() * 0.002 + 0.0003 });
    }

    function initNebulae() {
      nebulae = [];
      var colors = ['rgba(78,205,196,', 'rgba(162,155,254,', 'rgba(255,159,243,', 'rgba(254,202,87,', 'rgba(69,183,209,', 'rgba(255,107,107,'];
      for (let i = 0; i < 6; i++) {
        nebulae.push({
          x: Math.random() * W, y: Math.random() * H,
          r: 250 + Math.random() * 350,
          c: colors[i % colors.length],
          a: 0.012 + Math.random() * 0.008,
          dx: (Math.random() - 0.5) * 0.12,
          dy: (Math.random() - 0.5) * 0.08
        });
      }
    }

    function layoutRing() {
      if (!cur) return; cur.x = W / 2; cur.y = H / 2;
      const n = ring.length; if (n === 0) return;
      const rr = Math.max(160, Math.min(320, Math.min(W, H) * 0.26));
      ring.forEach((nd, i) => { const a = (i / n) * Math.PI * 2 - Math.PI / 2; nd.x = W / 2 + Math.cos(a) * rr; nd.y = H / 2 + Math.sin(a) * rr; });
    }

    function initParticles() {
      particles = [];
      if (!cur) return;
      ring.forEach(nd => {
        for (let i = 0; i < 4; i++) particles.push({ sx: cur.x, sy: cur.y, tx: nd.x, ty: nd.y, t: Math.random(), sp: 0.003 + Math.random() * 0.005, c: nd.c, size: 1.5 + Math.random() * 2.5, trail: [] });
      });
    }

    var anim = null;
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInOut(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

    function drillInto(id) {
      const nd = N[id]; if (!nd) return;
      const oldCur = cur;
      const oldRing = ring.slice();
      const newCur = { id, ...nd, x: W / 2, y: H / 2 };
      const newRing = gc(id);
      path.push(cur); cur = newCur; ring = newRing;
      layoutRing();
      const targetPositions = ring.map(nd2 => ({ x: nd2.x, y: nd2.y }));
      const clickedOld = oldRing.find(r => r.id === id);
      const fromX = clickedOld ? clickedOld.x : W / 2;
      const fromY = clickedOld ? clickedOld.y : H / 2;
      ring.forEach((nd2, i) => { nd2.x = W / 2; nd2.y = H / 2; });
      cur.x = fromX; cur.y = fromY;
      transform = d3.zoomIdentity; d3.select(canvas).call(zoom.transform, transform);
      initParticles(); updateBC(); updateLI();
      document.getElementById('info-panel').classList.remove('visible');
      var startTime = null; var duration = 600;
      if (anim) cancelAnimationFrame(anim);
      function step(ts) {
        if (!startTime) startTime = ts;
        var p = Math.min(1, (ts - startTime) / duration);
        var ep = easeInOut(p);
        cur.x = fromX + (W / 2 - fromX) * ep;
        cur.y = fromY + (H / 2 - fromY) * ep;
        ring.forEach((nd2, i) => {
          nd2.x = W / 2 + (targetPositions[i].x - W / 2) * ep;
          nd2.y = H / 2 + (targetPositions[i].y - H / 2) * ep;
        });
        if (p < 1) { anim = requestAnimationFrame(step); }
        else { anim = null; }
      }
      anim = requestAnimationFrame(step);
      setTimeout(() => { document.getElementById('drill-hint').style.opacity = '0'; }, 500);
    }

    function drillBack() {
      if (path.length === 0) return;
      const oldCur = cur;
      const newCur = path.pop(); ring = gc(newCur.id);
      layoutRing();
      const targetPositions = ring.map(nd2 => ({ x: nd2.x, y: nd2.y }));
      ring.forEach((nd2, i) => { nd2.x = W / 2; nd2.y = H / 2; });
      cur = newCur; cur.x = W / 2; cur.y = H / 2;
      transform = d3.zoomIdentity; d3.select(canvas).call(zoom.transform, transform);
      initParticles(); updateBC(); updateLI();
      document.getElementById('info-panel').classList.remove('visible');
      var startTime = null; var duration = 500;
      if (anim) cancelAnimationFrame(anim);
      function step(ts) {
        if (!startTime) startTime = ts;
        var p = Math.min(1, (ts - startTime) / duration);
        var ep = easeOut(p);
        ring.forEach((nd2, i) => {
          nd2.x = W / 2 + (targetPositions[i].x - W / 2) * ep;
          nd2.y = H / 2 + (targetPositions[i].y - H / 2) * ep;
        });
        if (p < 1) { anim = requestAnimationFrame(step); }
        else { anim = null; }
      }
      anim = requestAnimationFrame(step);
    }

    function drillTo(idx) {
      cur = path[idx]; path = path.slice(0, idx); ring = gc(cur.id);
      transform = d3.zoomIdentity; d3.select(canvas).call(zoom.transform, transform);
      layoutRing(); initParticles(); updateBC(); updateLI();
      document.getElementById('info-panel').classList.remove('visible');
    }

    function goRoot() {
      path = []; cur = { id: 'NEED', ...N.NEED, x: W / 2, y: H / 2 }; ring = gc('NEED');
      transform = d3.zoomIdentity; d3.select(canvas).call(zoom.transform, transform);
      layoutRing(); initParticles(); updateBC(); updateLI();
      document.getElementById('info-panel').classList.remove('visible');
    }

    function quickPath(id) { goRoot(); drillInto(id); }

    function updateBC() {
      const bc = document.getElementById('breadcrumb');
      let h = '<span onclick="goRoot()" style="cursor:pointer;color:#4ecdc4">首页</span>';
      path.forEach((d, i) => { h += ' <span class="sep">›</span> <span onclick="drillTo(' + i + ')" style="cursor:pointer;color:#666">' + d.n + '</span>'; });
      if (cur && cur.id !== 'NEED') h += ' <span class="sep">›</span> <span class="active">' + cur.n + '</span>';
      bc.innerHTML = h;
    }

    function updateLI() {
      const ln = document.getElementById('layer-name'); const lh = document.getElementById('layer-hint');
      if (!cur) return; ln.style.color = cur.c; ln.textContent = TL[cur.t] || ''; lh.textContent = TH[cur.t] || '';
    }

    function getR(nd, isC) {
      if (isC) return 48;
      if (nd.t === 'need') return 42; if (nd.t === 'industry') return 28;
      if (nd.t === 'soul') return 32; if (nd.t === 'tool') return 24;
      if (nd.t === 'solution') return 26; return 20;
    }

    function statusAlpha(nd) {
      if (nd.s === 'active') return 1; if (nd.s === 'training') return 0.85; return 0.45;
    }

    function hexToRgb(hex) {
      var r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      return { r: r, g: g, b: b };
    }

    function drawGlow(x, y, r, color, alpha) {
      var rgb = hexToRgb(color);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowColor = color;
      ctx.shadowBlur = r * 0.8;
      ctx.beginPath();
      ctx.arc(x, y, r * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',0.3)';
      ctx.fill();
      ctx.restore();
    }

    function draw() {
      frameCount++;
      ctx.save(); ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#030311'; ctx.fillRect(0, 0, W, H);

      nebulae.forEach(nb => {
        nb.x += nb.dx; nb.y += nb.dy;
        if (nb.x < -nb.r) nb.x = W + nb.r;
        if (nb.x > W + nb.r) nb.x = -nb.r;
        if (nb.y < -nb.r) nb.y = H + nb.r;
        if (nb.y > H + nb.r) nb.y = -nb.r;
        var g = ctx.createRadialGradient(nb.x, nb.y, 0, nb.x, nb.y, nb.r);
        g.addColorStop(0, nb.c + nb.a + ')');
        g.addColorStop(0.5, nb.c + (nb.a * 0.3) + ')');
        g.addColorStop(1, nb.c + '0)');
        ctx.fillStyle = g;
        ctx.fillRect(nb.x - nb.r, nb.y - nb.r, nb.r * 2, nb.r * 2);
      });

      ctx.translate(transform.x, transform.y); ctx.scale(transform.k, transform.k);

      stars.forEach(s => {
        s.a += Math.sin(Date.now() * s.s) * 0.008;
        var a = Math.max(0.05, Math.min(0.7, s.a));
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + a + ')'; ctx.fill();
      });

      if (cur) {
        var depth = path.length;
        var vanishX = W * 0.82;
        var vanishY = H * 0.18;
        var prevCx = cur.x, prevCy = cur.y;
        for (var li = 0; li < depth; li++) {
          var pn = path[li];
          var layerDepth = depth - li;
          var sc = Math.pow(1.25, layerDepth);
          var al = Math.pow(0.3, layerDepth);
          if (al < 0.03) continue;
          var shift = Math.min(1, 0.15 * layerDepth);
          var cx = cur.x + (vanishX - cur.x) * shift;
          var cy = cur.y + (vanishY - cur.y) * shift;
          ctx.save();
          ctx.globalAlpha = al;
          ctx.beginPath(); ctx.moveTo(prevCx, prevCy); ctx.lineTo(cx, cy);
          ctx.strokeStyle = pn.c + '15'; ctx.lineWidth = 1; ctx.setLineDash([3, 6]); ctx.stroke(); ctx.setLineDash([]);
          var pcr = getR(pn, true) * sc;
          drawGlow(cx, cy, pcr * 1.5, pn.c, al * 0.3);
          ctx.beginPath(); ctx.arc(cx, cy, pcr, 0, Math.PI * 2);
          ctx.strokeStyle = pn.c + '10'; ctx.lineWidth = 1; ctx.stroke();
          ctx.fillStyle = '#fff'; ctx.font = 'bold ' + Math.max(7, Math.floor(10 / layerDepth)) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          var pnm = pn.n.length > 5 ? pn.n.slice(0, 5) + '..' : pn.n;
          ctx.fillText(pnm, cx, cy);
          ctx.restore();
          prevCx = cx; prevCy = cy;
        }

        var now = Date.now();
        var pulse = Math.sin(now * 0.003) * 0.15 + 0.85;

        ring.forEach(nd => {
          var sa = statusAlpha(nd);
          var rgb = hexToRgb(nd.c);
          ctx.beginPath(); ctx.moveTo(cur.x, cur.y); ctx.lineTo(nd.x, nd.y);
          var lineGrad = ctx.createLinearGradient(cur.x, cur.y, nd.x, nd.y);
          lineGrad.addColorStop(0, 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + (sa * 0.15) + ')');
          lineGrad.addColorStop(1, 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + (sa * 0.05) + ')');
          ctx.strokeStyle = lineGrad; ctx.lineWidth = 1.5; ctx.stroke();
        });

        particles.forEach(p => {
          p.t += p.sp; if (p.t > 1) p.t -= 1;
          var x = p.sx + (p.tx - p.sx) * p.t;
          var y = p.sy + (p.ty - p.sy) * p.t;
          p.trail.push({ x: x, y: y });
          if (p.trail.length > 8) p.trail.shift();
          p.trail.forEach((tp, ti) => {
            var ta = (ti / p.trail.length) * 0.6 * (1 - p.t * 0.3);
            ctx.beginPath(); ctx.arc(tp.x, tp.y, p.size * (ti / p.trail.length) * 0.8, 0, Math.PI * 2);
            ctx.fillStyle = p.c + Math.floor(ta * 255).toString(16).padStart(2, '0'); ctx.fill();
          });
          ctx.beginPath(); ctx.arc(x, y, p.size * 1.2, 0, Math.PI * 2);
          ctx.fillStyle = p.c + 'ee'; ctx.fill();
          ctx.beginPath(); ctx.arc(x, y, p.size * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff88'; ctx.fill();
        });

        ring.forEach(nd => {
          var r = getR(nd, false);
          var sa = statusAlpha(nd);
          var isH = hovered === nd;
          var rgb = hexToRgb(nd.c);

          if (isH) {
            drawGlow(nd.x, nd.y, r * 2.5, nd.c, 0.3);
          }

          if (nd.s === 'active') {
            drawGlow(nd.x, nd.y, r * 1.8, nd.c, 0.15 + Math.sin(now * 0.004) * 0.05);
          }

          ctx.beginPath(); ctx.arc(nd.x, nd.y, r, 0, Math.PI * 2);
          var g = ctx.createRadialGradient(nd.x - r * 0.3, nd.y - r * 0.3, 0, nd.x, nd.y, r);
          g.addColorStop(0, 'rgba(' + Math.min(255, rgb.r + 60) + ',' + Math.min(255, rgb.g + 60) + ',' + Math.min(255, rgb.b + 60) + ',' + sa + ')');
          g.addColorStop(0.6, 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + (sa * 0.9) + ')');
          g.addColorStop(1, 'rgba(' + Math.floor(rgb.r * 0.4) + ',' + Math.floor(rgb.g * 0.4) + ',' + Math.floor(rgb.b * 0.4) + ',' + (sa * 0.6) + ')');
          ctx.fillStyle = g; ctx.fill();

          ctx.strokeStyle = isH ? 'rgba(255,255,255,0.9)' : 'rgba(' + Math.min(255, rgb.r + 40) + ',' + Math.min(255, rgb.g + 40) + ',' + Math.min(255, rgb.b + 40) + ',' + (sa * 0.5) + ')';
          ctx.lineWidth = isH ? 3 : 1.5; ctx.stroke();

          if (nd.s === 'locked') {
            ctx.beginPath(); ctx.arc(nd.x, nd.y, r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(5,5,16,0.4)'; ctx.fill();
            ctx.setLineDash([3, 4]); ctx.strokeStyle = 'rgba(100,100,100,0.4)'; ctx.lineWidth = 1; ctx.stroke(); ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = (r * 0.45) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('🔒', nd.x, nd.y - r * 0.15);
          }

          if (nd.s === 'active') {
            ctx.beginPath(); ctx.arc(nd.x + r * 0.65, nd.y - r * 0.65, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#4ecdc4'; ctx.fill();
            ctx.shadowColor = '#4ecdc4'; ctx.shadowBlur = 6; ctx.fill(); ctx.shadowBlur = 0;
          }

          if (nd.s === 'training') {
            var ta = now * 0.005;
            ctx.beginPath(); ctx.arc(nd.x + r * 0.65, nd.y - r * 0.65, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#feca57'; ctx.fill();
            ctx.shadowColor = '#feca57'; ctx.shadowBlur = 6; ctx.fill(); ctx.shadowBlur = 0;
            ctx.beginPath(); ctx.arc(nd.x, nd.y, r + 4, ta, ta + Math.PI * 0.5);
            ctx.strokeStyle = 'rgba(254,202,87,0.3)'; ctx.lineWidth = 1.5; ctx.stroke();
          }

          ctx.fillStyle = sa > 0.5 ? '#fff' : '#888';
          ctx.font = 'bold ' + (nd.n.length > 4 ? '10' : '11') + 'px "Microsoft YaHei",sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          var nm = nd.n.length > 6 ? nd.n.slice(0, 6) + '..' : nd.n;
          ctx.fillText(nm, nd.x, nd.y + (nd.s === 'locked' ? r * 0.2 : 0));
        });

        var cr = getR(cur, true);
        drawGlow(cur.x, cur.y, cr * 3, cur.c, 0.2 * pulse);

        ctx.beginPath(); ctx.arc(cur.x, cur.y, cr + 6, 0, Math.PI * 2);
        ctx.strokeStyle = cur.c + '30'; ctx.lineWidth = 1; ctx.stroke();

        var orbitAngle = now * 0.001;
        ctx.beginPath(); ctx.arc(cur.x, cur.y, cr + 12, orbitAngle, orbitAngle + Math.PI * 0.6);
        ctx.strokeStyle = cur.c + '25'; ctx.lineWidth = 2; ctx.stroke();
        ctx.beginPath(); ctx.arc(cur.x, cur.y, cr + 12, orbitAngle + Math.PI, orbitAngle + Math.PI * 1.6);
        ctx.strokeStyle = cur.c + '15'; ctx.lineWidth = 1.5; ctx.stroke();

        ctx.beginPath(); ctx.arc(cur.x, cur.y, cr, 0, Math.PI * 2);
        var cg = ctx.createRadialGradient(cur.x - cr * 0.3, cur.y - cr * 0.3, 0, cur.x, cur.y, cr);
        var curRgb = hexToRgb(cur.c);
        cg.addColorStop(0, 'rgba(' + Math.min(255, curRgb.r + 80) + ',' + Math.min(255, curRgb.g + 80) + ',' + Math.min(255, curRgb.b + 80) + ',1)');
        cg.addColorStop(0.5, cur.c);
        cg.addColorStop(1, 'rgba(' + Math.floor(curRgb.r * 0.5) + ',' + Math.floor(curRgb.g * 0.5) + ',' + Math.floor(curRgb.b * 0.5) + ',0.7)');
        ctx.fillStyle = cg; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2.5; ctx.stroke();

        ctx.fillStyle = '#fff'; ctx.font = 'bold 13px "Microsoft YaHei",sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        var cn = cur.n.length > 8 ? cur.n.slice(0, 8) + '..' : cur.n;
        ctx.fillText(cn, cur.x, cur.y - 7);
        ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '10px "Microsoft YaHei",sans-serif';
        ctx.fillText(TL[cur.t] || '', cur.x, cur.y + 11);
      }

      ctx.restore(); requestAnimationFrame(draw);
    }

    function findNode(mx, my) {
      const x = (mx - transform.x) / transform.k; const y = (my - transform.y) / transform.k;
      let closest = null, minD = Infinity;
      if (cur) { const d = Math.hypot(cur.x - x, cur.y - y); if (d < getR(cur, true) + 5) { closest = { ...cur, isCenter: true, layerIdx: -1 }; minD = d; } }
      ring.forEach(nd => { const d = Math.hypot(nd.x - x, nd.y - y); const r = getR(nd, false) + 5; if (d < r && d < minD) { closest = { ...nd, isCenter: false, layerIdx: -1 }; minD = d; } });
      var depth = path.length;
      var vanishX = W * 0.82;
      var vanishY = H * 0.18;
      for (var li = 0; li < depth; li++) {
        var pn = path[li];
        var layerDepth = depth - li;
        var sc = Math.pow(1.25, layerDepth);
        var al = Math.pow(0.3, layerDepth);
        if (al < 0.03) continue;
        var shift = Math.min(1, 0.15 * layerDepth);
        var cx = cur.x + (vanishX - cur.x) * shift;
        var cy = cur.y + (vanishY - cur.y) * shift;
        var pcr = getR(pn, true) * sc;
        var d = Math.hypot(cx - x, cy - y);
        if (d < pcr + 5 && d < minD) { closest = { ...pn, isCenter: true, layerIdx: li }; minD = d; }
      }
      return closest;
    }

    function showInfo(nd) {
      if (!nd) return;
      const p = document.getElementById('info-panel'); const c = document.getElementById('panel-content');
      p.setAttribute('aria-hidden', 'false');
      let h = '<div class="node-name" style="color:' + nd.c + '">' + nd.n + '</div>';
      h += '<div class="node-type">' + (TL[nd.t] || nd.t) + '</div>';

      h += '<div class="tag" style="background:' + sc + '22;color:' + sc + '">' + sl + '</div>';
      if (nd.expert) h += '<div class="tag" style="background:' + nd.c + '22;color:' + nd.c + '">' + nd.expert + '</div>';
      if (nd.tier) h += '<div class="tag" style="background:rgba(255,255,255,0.04);color:#666">Tier ' + nd.tier + '</div>';
      if (nd.status) h += '<div class="tag" style="background:rgba(254,202,87,0.1);color:#feca57">' + nd.status + '</div>';

        var dpid = gp(nd.id);
        h += '<div class="tag" style="background:rgba(78,205,196,0.1);color:#4ecdc4;cursor:pointer" onclick="goToParent(\'' + (dpid || '') + '\')">' + nd.domain + ' ›</div>';
      }
      if (nd.price) h += '<div class="tag" style="background:rgba(254,202,87,0.1);color:#feca57">' + nd.price + '</div>';
      if (nd.city) h += '<div class="tag" style="background:rgba(0,210,255,0.1);color:#00d2ff">' + nd.city + '</div>';
      if (nd.cat) h += '<div class="tag" style="background:rgba(162,155,254,0.1);color:#a29bfe">' + nd.cat + '</div>';
      if (nd.pop) h += '<div class="tag" style="background:rgba(254,202,87,0.1);color:#feca57">Pop:' + nd.pop + '</div>';
      if (nd.d) h += '<div class="desc">' + nd.d + '</div>';
      if (nd.focus) h += '<div class="section"><div class="section-title">专注领域</div><div class="desc">' + nd.focus + '</div></div>';
      if (nd.hot) { h += '<div class="section"><div class="section-title">热门模板</div><ul class="child-list">'; nd.hot.forEach(t => { h += '<li><span style="color:#ff6b6b;font-size:10px">🔥</span>' + t + '</li>'; }); h += '</ul></div>'; }

      if (nd.t === 'soul') {
        h += '<div class="section" style="margin-top:8px">';
        if (nd.s === 'active' || nd.s === 'training') {

    // 检测文本是否包含代码块
    function containsCodeBlocks(text) {
      // 检测代码块标记
      const codePatterns = [
        /```[\s\S]*?```/,  // 代码块
        /`[^`]+`/,        // 行内代码
        /function\s+\w+\s*\(/,  // 函数定义
        /class\s+\w+\s*\{/,    // 类定义
        /import\s+/,      // import语句
        /const\s+\w+\s*=/,    // const声明
        /let\s+\w+\s*=/,      // let声明
        /var\s+\w+\s*=/,      // var声明
        /(\r\n|\n)[\s\S]*?[\s\S]*(\r\n|\n)/  // 多行文本
      ];

      // 如果文本长度超过50个字符，或者包含代码标记，则认为是代码
      return text.length > 50 || codePatterns.some(pattern => pattern.test(text));
    }

    // 复制到剪贴板
    function copyToClipboard(text) {
      // 创建临时textarea元素
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-999999px';
      textarea.style.top = '-999999px';
      document.body.appendChild(textarea);

      // 选中文本并复制
      textarea.select();
      textarea.setSelectionRange(0, 99999); // 移动端兼容

      try {
        const successful = document.execCommand('copy');
        document.body.removeChild(textarea);

        // 显示复制成功提示
        showCopyNotification(successful);
        return successful;
      } catch (err) {
        document.body.removeChild(textarea);
        console.error('复制失败:', err);
        showCopyNotification(false);
        return false;
      }
    }

        background: ${success ? '#00ffcc' : '#ff6b9d'};
        color: ${success ? '#000' : '#fff'};
        padding: 12px 20px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        z-index: 10000;
        animation: slideIn 0.3s ease-out;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      `;
      notification.textContent = success ? '✓ 复制成功' : '✗ 复制失败';

      // 添加动画样式
      if (!document.getElementById('copy-notification-style')) {
        const style = document.createElement('style');
        style.id = 'copy-notification-style';
        style.textContent = `
          @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
          }
        `;
        document.head.appendChild(style);
      }

      document.body.appendChild(notification);

      // 3秒后自动移除
      setTimeout(() => {
        notification.style.animation = 'slideIn 0.3s ease-out reverse';
        setTimeout(() => {

    function searchNodes(query) {
      if (!query || query.length < 1) { searchResults.classList.remove('visible'); return; }
      var q = query.toLowerCase();
      var results = [];
      Object.entries(N).forEach(function ([id, nd]) {
        var score = 0;
        if (nd.n.toLowerCase().includes(q)) score += 10;
        if (nd.d && nd.d.toLowerCase().includes(q)) score += 3;
        if (nd.expert && nd.expert.toLowerCase().includes(q)) score += 5;
        if (nd.cat && nd.cat.toLowerCase().includes(q)) score += 4;
        if (nd.domain && nd.domain.toLowerCase().includes(q)) score += 3;
        if (TL[nd.t] && TL[nd.t].toLowerCase().includes(q)) score += 2;
        if (nd.hot) nd.hot.forEach(function (h) { if (h.toLowerCase().includes(q)) score += 2; });
        if (score > 0) results.push({ id: id, ...nd, score: score });
      });
      results.sort(function (a, b) { return b.score - a.score; });
      return results.slice(0, 12);
    }

    function renderSearchResults(results) {

      if (vb) vb.style.display = 'block';
    }

    document.getElementById('quick-start').classList.add('collapsed');
    document.getElementById('quick-start').addEventListener('click', function (e) {
      if (this.classList.contains('collapsed')) { this.classList.remove('collapsed'); e.stopPropagation(); }
    });

    document.getElementById('legend').classList.add('collapsed');
    document.getElementById('legend').addEventListener('click', function (e) {
      if (this.classList.contains('collapsed')) { this.classList.remove('collapsed'); e.stopPropagation(); }
    });

    var headerEl = document.getElementById('header');
    headerEl.addEventListener('click', function (e) {
      if (this.classList.contains('collapsed')) { this.classList.remove('collapsed'); e.stopPropagation(); }
    });
    headerEl.querySelector('.brand').addEventListener('dblclick', function (e) {
      headerEl.classList.add('collapsed');
    });

    // TRAE集成函数
    function connectToTrae() {
      showNotification('正在连接TRAE...');
      // 模拟连接过程
      setTimeout(() => {
        document.getElementById('trae-connect-btn').style.background = 'rgba(78,205,196,0.2)';
        document.getElementById('trae-connect-btn').innerHTML = '<i class="fas fa-check"></i> 已连接';
        showNotification('✓ 已连接到TRAE');
      }, 2000);
    }

    function launchTraeAgent() {
      if (!chatSoul) {
        showNotification('请先选择一个灵魂专家');
        return;
      }

      const agentName = chatSoul.n + '-TRAE';
      showNotification('正在启动TRAE代理: ' + agentName);

      // 模拟启动过程
      setTimeout(() => {
        document.getElementById('trae-launch-btn').style.background = 'rgba(255,153,255,0.2)';
        document.getElementById('trae-launch-btn').innerHTML = '<i class="fas fa-check"></i> 已启动';
        showNotification('✓ TRAE代理 ' + agentName + ' 已启动');
      }, 1500);
    }

    function delegateToSolo() {
      if (!chatSoul) {
        showNotification('请先选择一个灵魂专家');
        return;
      }

      const input = document.getElementById('chat-input');
      const task = input.value.trim();

      if (!task) {
        showNotification('请输入要委派的任务');
        return;
      }

      showNotification('正在委派任务到TRAE SOLO...');

      // 模拟委派过程
      setTimeout(() => {
        document.getElementById('trae-delegate-btn').style.background = 'rgba(255,193,7,0.2)';
        document.getElementById('trae-delegate-btn').innerHTML = '<i class="fas fa-check"></i> 已委派';
        showNotification('✓ 任务已委派到TRAE SOLO');
        input.value = '';

        // 添加委派成功的系统消息
        addChatMsg('system', '任务已委派给' + chatSoul.n + '专家，TRAE正在处理...');
      }, 1000);
    }

    function showNotification(message) {
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(78,205,196,0.9);
        color: #000;
        padding: 12px 20px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        z-index: 10000;
        animation: slideIn 0.3s ease-out;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      `;
      notification.textContent = message;

      // 添加动画样式
      if (!document.getElementById('notification-style')) {
        const style = document.createElement('style');
        style.id = 'notification-style';
        style.textContent = `
          @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
          }
        `;
        document.head.appendChild(style);
      }

      document.body.appendChild(notification);

      // 3秒后自动移除
      setTimeout(() => {
        notification.style.animation = 'slideIn 0.3s ease-out reverse';
        setTimeout(() => {
          if (notification.parentNode) {
            notification.parentNode.removeChild(notification);
          }
        }, 300);
      }, 3000);
    }

    document.addEventListener('click', function (e) {
      var qs = document.getElementById('quick-start');
      var lg = document.getElementById('legend');
      var hd = document.getElementById('header');
      if (qs && !qs.contains(e.target)) qs.classList.add('collapsed');
      if (lg && !lg.contains(e.target)) lg.classList.add('collapsed');
      if (hd && !hd.contains(e.target)) hd.classList.add('collapsed');
    });
  </script>
</body>

</html>
