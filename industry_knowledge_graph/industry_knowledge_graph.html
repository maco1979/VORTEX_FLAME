        { "source": "SOUL_MONTESQUIEU", "target": "SI_GOVDIG", "type": "soul_bind", "weight": 1.0 },

        { "source": "SOUL_HERODOTUS", "target": "SI_EDUPUB", "type": "soul_bind", "weight": 1.0 }
      ]
    };

    const nodes = [];
    const nodeSet = new Set();
    const links = [];
    const colors = { "1": "#ff6b6b", "2": "#4ecdc4", "3": "#45b7d1", "4": "#feca57", "soul": "#ff9ff3" };
    const tierColors = { "A": "#ff4757", "B": "#ff6348", "C": "#ffa502", "D": "#2ed573", "E": "#1e90ff" };
    const nodeDetails = {};

    for (const [key, layer] of Object.entries(graphData.layers)) {
      for (const n of layer.nodes) {
        if (!nodeSet.has(n.id)) {
          nodeSet.add(n.id);
          const lvl = n.level || "soul";
          const isNonEcon = n.type === "非经济";
          let color = isNonEcon ? "#96ceb4" : (colors[lvl] || "#999");
          let radius = lvl === "1" ? 22 : lvl === "2" ? 17 : lvl === "3" ? 13 : lvl === "4" ? 9 : 20;
          if (lvl === "soul" && n.tier) {
            color = tierColors[n.tier] || "#ff9ff3";
            radius = n.tier === "A" ? 24 : n.tier === "B" ? 20 : 16;
          }
          nodes.push({ id: n.id, name: n.name, level: lvl, color, radius, tier: n.tier });
          nodeDetails[n.id] = n;
        }
      }
    }

    const typeColors = {
      "depend_on": "#ff6b6b", "apply_tech": "#4ecdc4", "belongs_to": "#45b7d1",
      "soul_science": "#dda0dd", "soul_bind": "#ff9ff3"
    };

    for (const e of graphData.edges) {
      if (nodeSet.has(e.source) && nodeSet.has(e.target)) {
        links.push({ source: e.source, target: e.target, type: e.type, weight: e.weight, color: typeColors[e.type] || "#666" });
      }
    }

    const svg = d3.select("#graph");
    const width = window.innerWidth;
    const height = window.innerHeight;

    const g = svg.append("g");

    const zoom = d3.zoom().scaleExtent([0.2, 5]).on("zoom", (event) => {
      g.attr("transform", event.transform);
    });
    svg.call(zoom);

    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id).distance(d => {
        if (d.type === "soul_bind") return 80;
        if (d.type === "soul_science") return 120;
        if (d.type === "belongs_to") return 60;
        if (d.type === "apply_tech") return 80;
        return 70;
      }))
      .force("charge", d3.forceManyBody().strength(-200))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("collision", d3.forceCollide().radius(d => d.radius + 8))
      .force("x", d3.forceX(width / 2).strength(0.03))
      .force("y", d3.forceY(height / 2).strength(0.03));

    const link = g.append("g").selectAll("line").data(links).join("line")
      .attr("class", "link").attr("stroke", d => d.color)
      .attr("stroke-width", d => Math.max(1, d.weight * 2.5));

    const node = g.append("g").selectAll("g").data(nodes).join("g").attr("class", "node")
      .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

    node.append("circle").attr("r", d => d.radius).attr("fill", d => d.color)
      .attr("stroke", "#fff").attr("stroke-width", 1.5);

    node.append("text").attr("dy", d => d.radius + 13).attr("text-anchor", "middle")
      .text(d => d.name).attr("fill", "#c9d1d9").attr("font-size", d => d.level === "soul" ? "11px" : "9px");

    const infoDiv = document.getElementById("info");

    node.on("click", function (event, d) {
      event.stopPropagation();
      const detail = nodeDetails[d.id];
      let html = `<h3>${detail.name}</h3>`;
      if (detail.tier) {
        html += `<p>Tier: ${detail.tier} | LoRA r=${detail.lora_r}</p>`;
        html += `<p>专长: ${detail.expert}</p>`;
        html += `<p>训练: ${detail.training}</p>`;
        if (detail.industries) html += `<p>绑定行业: ${detail.industries.length}个</p>`;
      } else if (detail.level === 1) {
        html += `<p>类别: ${detail.category}</p>`;
        if (detail.bound_souls) html += `<p>绑定灵魂: ${detail.bound_souls.join(', ')}</p>`;
      } else if (detail.level === 4) {
        html += `<p>灵魂: ${detail.soul_mapping}</p>`;
      } else if (detail.level === 3) {
        html += `<p>类型: ${detail.type || '经济'}</p>`;
        if (detail.bound_souls) html += `<p>绑定灵魂: ${detail.bound_souls.join(', ')}</p>`;
      } else if (detail.level === 2) {
        if (detail.bound_souls) html += `<p>绑定灵魂: ${detail.bound_souls.join(', ')}</p>`;
      }
      const connected = links.filter(l => l.source.id === d.id || l.target.id === d.id);
      html += `<p>连接数: ${connected.length}</p>`;
      infoDiv.innerHTML = html;
      infoDiv.style.display = "block";
    });

    svg.on("click", function (event) {
      if (event.target.tagName === "svg") infoDiv.style.display = "none";
    });

    simulation.on("tick", () => {
      link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      node.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    function dragstarted(event) { if (!event.active) simulation.alphaTarget(0.3).restart(); event.subject.fx = event.subject.x; event.subject.fy = event.subject.y; }
    function dragged(event) { event.subject.fx = event.x; event.subject.fy = event.y; }
    function dragended(event) { if (!event.active) simulation.alphaTarget(0); event.subject.fx = null; event.subject.fy = null; }

    function zoomFit() {
      const bounds = g.node().getBBox();
      const fullWidth = bounds.width + 100;
      const fullHeight = bounds.height + 100;
      const midX = bounds.x + bounds.width / 2;
      const midY = bounds.y + bounds.height / 2;
      const scale = 0.9 / Math.max(fullWidth / width, fullHeight / height);
      const translate = [width / 2 - scale * midX, height / 2 - scale * midY];
      svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale));
    }
    function zoomIn() { svg.transition().duration(300).call(zoom.scaleBy, 1.5); }
    function zoomOut() { svg.transition().duration(300).call(zoom.scaleBy, 0.67); }

    setTimeout(zoomFit, 2000);
  </script>
