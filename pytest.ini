[pytest]
python_files = _test_*.py
python_classes = Test*
python_functions = test_*
testpaths = .
norecursedirs =
    .git
    .venv
    .trae
    .vf_memory
    node_modules
    __pycache__
    kb_harness
    kb_mcp
    kb_skill
    kb_workflow
    tools
    design_specs
    soul_config
    industry_knowledge_graph
    ajepa_checkpoints
    finjepa_checkpoints
    data
    logs
addopts = -q --tb=short
