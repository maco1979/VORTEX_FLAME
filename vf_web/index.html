<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORTEX FLAME</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M16 4L28 10v12L16 28 4 22V10z' stroke='%23c8a951' stroke-width='2' fill='none'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --c0:#080808;--c1:#121212;--c2:#1a1a1a;--c3:#242424;--c4:#2e2e2e;
  --t0:#f0f0f0;--t1:#c0c0c0;--t2:#808080;--t3:#505050;
  --acc:#c8a951;--ok:#6b8;--warn:#da8;--err:#c66;
  --ff:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --ffs:'Noto Serif SC','STSong','SimSun',serif;
  --ffm:'JetBrains Mono',ui-monospace,monospace;
  --r:4px;--rl:8px;
  --nav-w:44px;--tree-w:220px;--chat-w:340px;
}
html,body{height:100%;overflow:hidden;background:var(--c0)}
body{font-family:var(--ff);font-size:13px;line-height:1.5;color:var(--t1)}

.app{display:grid;grid-template-columns:var(--nav-w) var(--tree-w) 1fr var(--chat-w);height:100vh}
.app.no-tree{grid-template-columns:var(--nav-w) 0 1fr var(--chat-w)}
.app.no-chat{grid-template-columns:var(--nav-w) var(--tree-w) 1fr 0}
.app.no-tree.no-chat{grid-template-columns:var(--nav-w) 0 1fr 0}

/* ── NAV: ultra-minimal ── */
.nav{background:var(--c1);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;border-right:1px solid var(--c3)}
.nav-logo{width:28px;height:28px;margin-bottom:12px;cursor:pointer;opacity:.7;transition:opacity .2s}
.nav-logo svg{width:22px;height:22px}
.nav-logo:hover{opacity:1}
.nav-item{width:32px;height:32px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);font-size:15px;transition:all .15s;position:relative}
.nav-item:hover{background:var(--c3);color:var(--t1)}
.nav-item.active{background:var(--c3);color:var(--acc)}
.nav-spacer{flex:1}
.nav-item .tip{position:absolute;left:38px;top:50%;transform:translateY(-50%);background:var(--c2);padding:3px 10px;border-radius:3px;font-size:10px;color:var(--t1);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s;border:1px solid var(--c4);z-index:100}
.nav-item:hover .tip{opacity:1}

/* ── TREE ── */
.tree-panel{background:var(--c1);border-right:1px solid var(--c3);display:flex;flex-direction:column;overflow:hidden}
.tree-header{padding:10px 12px;font-size:10px;font-weight:500;letter-spacing:.06em;color:var(--t3);text-transform:uppercase;border-bottom:1px solid var(--c3);display:flex;align-items:center;justify-content:space-between}
.tree-actions{display:flex;gap:4px}
.tree-actions button{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:1px 6px;border-radius:2px;line-height:1}
.tree-actions button:hover{background:var(--c3);color:var(--t1)}
.tree-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 0}
.tree-body::-webkit-scrollbar{width:4px}
.tree-body::-webkit-scrollbar-thumb{background:var(--c4);border-radius:2px}
.tree-path{font-size:10px;color:var(--t3);padding:3px 12px 8px;font-family:var(--ffm);word-break:break-all}
.tree-row{display:flex;align-items:center;height:24px;padding:0 6px;cursor:pointer;gap:3px;transition:background .06s;white-space:nowrap;font-size:12px}
.tree-row:hover{background:var(--c3)}
.tree-row.active{background:rgba(200,169,81,.1);color:var(--acc)}
.tree-arrow{width:12px;font-size:8px;color:var(--t3);flex-shrink:0;text-align:center;cursor:pointer}
.tree-icon{font-size:12px;flex-shrink:0;width:14px;text-align:center}
.tree-name{overflow:hidden;text-overflow:ellipsis;color:var(--t2)}
.tree-row.dir>.tree-name{color:var(--t1)}

/* ── MAIN ── */
.main-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--c0)}
.tab-bar{display:flex;align-items:stretch;height:30px;background:var(--c1);border-bottom:1px solid var(--c3);overflow-x:auto;flex-shrink:0}
.tab-bar::-webkit-scrollbar{height:2px}
.tab-bar::-webkit-scrollbar-thumb{background:var(--c4)}
.tab{display:flex;align-items:center;gap:5px;padding:0 12px;font-size:11px;cursor:pointer;border-right:1px solid var(--c3);color:var(--t3);white-space:nowrap;transition:all .1s;min-width:90px}
.tab:hover{background:var(--c2);color:var(--t1)}
.tab.active{background:var(--c2);color:var(--t0);border-bottom:2px solid var(--acc)}
.tab .tab-close{font-size:14px;color:var(--t3);line-height:1;cursor:pointer;padding:0 2px;border-radius:2px}
.tab .tab-close:hover{color:var(--err);background:var(--c3)}
.tab .tab-dirty{color:var(--acc);font-size:14px;line-height:0}

.editor-wrap{flex:1;display:flex;overflow:hidden;position:relative}
.editor-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.editor-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--t3);gap:12px}
.editor-empty svg{width:64px;height:64px;opacity:.12}
.editor-empty-title{font-family:var(--ffs);font-size:22px;color:var(--t2);font-weight:300}
.editor-empty-sub{font-size:13px;color:var(--t3)}
.editor-empty kbd{display:inline-block;padding:2px 8px;border-radius:3px;background:var(--c2);border:1px solid var(--c4);font-family:var(--ffm);font-size:10px;margin:0 2px;color:var(--acc)}
.editor-area{flex:1;display:flex;overflow:hidden}
.editor-lines{width:44px;flex-shrink:0;background:var(--c1);padding:10px 0;overflow:hidden;border-right:1px solid var(--c3);text-align:right;user-select:none}
.editor-lines div{padding:0 8px 0 4px;font-family:var(--ffm);font-size:11px;line-height:19px;color:var(--t3);height:19px}
.editor-text{flex:1;position:relative}
.editor-text textarea{width:100%;height:100%;background:transparent;border:none;outline:none;color:var(--t0);font-family:var(--ffm);font-size:12px;line-height:19px;padding:10px 12px;resize:none;tab-size:4;white-space:pre;overflow-wrap:normal;overflow-x:auto}
.editor-text textarea::selection{background:rgba(200,169,81,.2)}
.editor-text textarea::-webkit-scrollbar{width:6px;height:6px}
.editor-text textarea::-webkit-scrollbar-thumb{background:var(--c4);border-radius:3px}

.status-bar{height:24px;background:var(--c1);border-top:1px solid var(--c3);display:flex;align-items:center;padding:0 10px;gap:14px;font-size:10px;color:var(--t3);flex-shrink:0;font-family:var(--ffm)}
.status-bar .spacer{flex:1}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px}
.status-dot.ok{background:var(--ok)}
.status-dot.warn{background:var(--warn)}
.status-dot.err{background:var(--err)}

/* ── CHAT ── */
.chat-panel{background:var(--c1);border-left:1px solid var(--c3);display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:10px 14px;border-bottom:1px solid var(--c3);display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.chat-header-actions{display:flex;gap:4px}
.chat-header-actions button{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:2px 6px;border-radius:3px}
.chat-header-actions button:hover{color:var(--t1)}
.chat-souls{display:flex;gap:3px;padding:6px 10px;flex-wrap:wrap;border-bottom:1px solid var(--c4);flex-shrink:0}
.chat-soul-tag{padding:3px 9px;border-radius:12px;font-size:10px;cursor:pointer;white-space:nowrap;border:1px solid var(--c4);color:var(--t3);transition:all .12s;display:flex;align-items:center;gap:3px}
.chat-soul-tag:hover{border-color:var(--t2);color:var(--t1)}
.chat-soul-tag.active{border-color:var(--acc);color:var(--acc)}
.chat-soul-tag svg{width:10px;height:10px;flex-shrink:0}
.chat-messages{flex:1;overflow-y:auto;padding:10px}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--c4);border-radius:2px}
.chat-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:8px}
.chat-welcome svg{width:36px;height:36px;opacity:.25}
.chat-welcome h3{font-family:var(--ffs);font-size:16px;color:var(--t2);font-weight:400}
.chat-welcome p{font-size:11px;color:var(--t3);max-width:220px}
.chat-hints{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.chat-hint{padding:3px 10px;border-radius:12px;font-size:10px;background:var(--c2);border:1px solid var(--c4);color:var(--t3);cursor:pointer;transition:.12s}
.chat-hint:hover{border-color:var(--acc);color:var(--acc)}

.chat-msg{margin-bottom:8px;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.user{display:flex;justify-content:flex-end}
.chat-msg.user .bubble{background:var(--c3);color:var(--t0);border-radius:var(--rl) var(--rl) 3px var(--rl);padding:7px 11px;max-width:85%;font-size:12px;line-height:1.6}
.chat-msg.soul{display:flex;gap:7px;align-items:flex-start}
.chat-msg-avatar{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;background:var(--c3);border:1px solid var(--c4)}
.chat-msg-avatar svg{width:12px;height:12px}
.chat-msg-body{flex:1;min-width:0}
.chat-msg-name{font-size:10px;font-weight:500;margin-bottom:2px}
.chat-msg-text{background:var(--c2);border:1px solid var(--c4);border-radius:3px var(--r) var(--r) var(--r);padding:7px 11px;font-size:12px;line-height:1.6;color:var(--t1);max-width:95%;word-break:break-word}

.loading-dots{display:flex;gap:4px;padding:6px 10px}
.loading-dots span{width:5px;height:5px;border-radius:50%;background:var(--t3);animation:dotBounce 1.4s infinite ease-in-out both}
.loading-dots span:nth-child(1){animation-delay:-.32s}
.loading-dots span:nth-child(2){animation-delay:-.16s}
@keyframes dotBounce{0%,80%,100%{transform:scale(.5);opacity:.2}40%{transform:scale(1);opacity:1}}

.chat-input-wrap{padding:8px 10px;border-top:1px solid var(--c3);display:flex;gap:5px}
.chat-input{flex:1;background:var(--c2);border:1px solid var(--c4);border-radius:var(--r);padding:7px 10px;color:var(--t0);font-family:var(--ff);font-size:12px;outline:none;transition:border .15s;resize:none;min-height:34px;max-height:90px;line-height:1.4}
.chat-input:focus{border-color:var(--acc)}
.chat-send{width:34px;height:34px;border-radius:var(--r);border:1px solid var(--c4);cursor:pointer;background:var(--c2);color:var(--t3);font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.chat-send:hover{background:var(--c3);color:var(--acc);border-color:var(--acc)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:15vh}
.search-dlg{background:var(--c1);border:1px solid var(--c4);border-radius:var(--rl);width:520px;max-height:55vh;display:flex;flex-direction:column}
.search-dlg input{width:100%;padding:12px 16px;background:transparent;border:none;outline:none;color:var(--t0);font-size:14px;font-family:var(--ff);border-bottom:1px solid var(--c3)}
.search-results{flex:1;overflow-y:auto;padding:4px}
.search-item{padding:7px 12px;cursor:pointer;border-radius:var(--r);transition:background .08s}
.search-item:hover{background:var(--c3)}
.search-item .sf{font-family:var(--ffm);font-size:11px;color:var(--t1)}
.search-item .sl{font-size:10px;color:var(--t3);font-family:var(--ffm);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-item .sm{font-size:9px;color:var(--acc);font-family:var(--ffm)}
.empty-state{padding:32px;text-align:center;color:var(--t3);font-size:12px}

.page-dashboard{padding:20px;overflow-y:auto;flex:1}
.page-dashboard::-webkit-scrollbar{width:4px}
.page-dashboard::-webkit-scrollbar-thumb{background:var(--c4);border-radius:2px}
.dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--c1);border:1px solid var(--c3);border-radius:var(--r);padding:12px;transition:.15s}
.stat-card:hover{border-color:var(--c4)}
.stat-label{font-size:10px;color:var(--t3);margin-bottom:4px}
.stat-value{font-size:24px;font-weight:500}
.stat-sub{font-size:9px;color:var(--t3);margin-top:1px;font-family:var(--ffm)}
.dash-section{background:var(--c1);border:1px solid var(--c3);border-radius:var(--r);padding:12px;margin-bottom:8px}
.dash-section-title{font-size:11px;font-weight:500;color:var(--t1);margin-bottom:8px}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:11px}
.bar-label{min-width:85px;color:var(--t2);display:flex;align-items:center;gap:4px}
.bar-label svg{width:10px;height:10px}
.bar-track{flex:1;height:4px;background:var(--c3);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.bar-val{font-family:var(--ffm);font-size:9px;color:var(--t3);min-width:30px;text-align:right}

.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.skill-card{background:var(--c1);border:1px solid var(--c3);border-radius:var(--r);padding:10px;transition:.12s}
.skill-card:hover{border-color:var(--c4)}
.skill-name{font-size:12px;font-weight:500;margin-bottom:3px;color:var(--t1)}
.skill-desc{font-size:11px;color:var(--t3);margin-bottom:5px}
.skill-tags{display:flex;gap:3px;flex-wrap:wrap}
.skill-tag{padding:1px 7px;border-radius:8px;font-size:9px;background:rgba(200,169,81,.08);color:var(--acc)}

.hermes-card{background:var(--c1);border:1px solid var(--c3);border-radius:var(--r);padding:12px;margin-bottom:8px}
.hermes-model-row{display:flex;align-items:center;gap:7px;padding:5px 0;font-size:12px}
.hermes-model-icon{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.hermes-model-name{flex:1;color:var(--t2)}
.hermes-model-tag{padding:2px 8px;border-radius:8px;font-size:9px;font-family:var(--ffm)}
.tag-ok{background:rgba(102,187,136,.1);color:var(--ok)}
.tag-warn{background:rgba(221,170,136,.1);color:var(--warn)}
.tag-info{background:rgba(136,170,204,.1);color:#8ac}
</style>
</head>
<body>

<div class="app" id="app">
<nav class="nav">
  <div class="nav-logo" onclick="location.reload()" title="VORTEX FLAME">
    <svg viewBox="0 0 32 32" fill="none"><path d="M16 4L28 10v12L16 28 4 22V10z" stroke="#c8a951" stroke-width="1.5" fill="none"/><path d="M16 4v24" stroke="#c8a951" stroke-width="0.6" opacity="0.3"/></svg>
  </div>
  <div class="nav-item active" data-page="files" onclick="switchPage('files')">
    <svg viewBox="0 0 18 18" fill="none" width="15" height="15"><rect x="2" y="3" width="14" height="12" rx="1.2" stroke="currentColor" stroke-width="1.1" fill="none"/><line x1="2" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1.1"/></svg>
    <span class="tip">文件</span>
  </div>
  <div class="nav-item" data-page="chatfull" onclick="switchPage('chatfull')">
    <svg viewBox="0 0 18 18" fill="none" width="15" height="15"><path d="M3 4h12M3 8h8M3 12h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    <span class="tip">对话</span>
  </div>
  <div class="nav-item" data-page="dashboard" onclick="switchPage('dashboard')">
    <svg viewBox="0 0 18 18" fill="none" width="15" height="15"><rect x="1" y="1" width="6.5" height="6.5" rx="1" stroke="currentColor" stroke-width="1.1"/><rect x="10.5" y="1" width="6.5" height="6.5" rx="1" stroke="currentColor" stroke-width="1.1"/><rect x="1" y="10.5" width="6.5" height="6.5" rx="1" stroke="currentColor" stroke-width="1.1"/><rect x="10.5" y="10.5" width="6.5" height="6.5" rx="1" stroke="currentColor" stroke-width="1.1"/></svg>
    <span class="tip">仪表盘</span>
  </div>
  <div class="nav-item" data-page="skills" onclick="switchPage('skills')">
    <svg viewBox="0 0 18 18" fill="none" width="15" height="15"><circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.1"/><line x1="9" y1="3.5" x2="9" y2="14.5" stroke="currentColor" stroke-width="1.1"/><line x1="3.5" y1="9" x2="14.5" y2="9" stroke="currentColor" stroke-width="1.1"/></svg>
    <span class="tip">技能</span>
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-item" onclick="toggleChat()">
    <svg viewBox="0 0 18 18" fill="none" width="14" height="14"><path d="M11 3l-6 6 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="tip">面板</span>
  </div>
  <div class="nav-item" onclick="openSearch()">
    <svg viewBox="0 0 18 18" fill="none" width="14" height="14"><circle cx="7.5" cy="7.5" r="4.5" stroke="currentColor" stroke-width="1.2"/><line x1="11" y1="11" x2="16" y2="16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    <span class="tip">搜索</span>
  </div>
</nav>

<aside class="tree-panel" id="treePanel">
  <div class="tree-header"><span>文件浏览器</span><div class="tree-actions"><button onclick="refreshTree()" title="刷新">↻</button><button onclick="newFile()" title="新建">+</button></div></div>
  <div class="tree-path" id="treePath">D:\VORTEX_FLAME</div>
  <div class="tree-body" id="treeBody"></div>
</aside>

<main class="main-panel" id="mainPanel">
  <div class="tab-bar" id="tabBar"></div>
  <div class="editor-wrap" id="editorWrap">
    <div class="editor-content" id="editorContent">
      <div class="editor-empty" id="editorEmpty">
        <svg viewBox="0 0 32 32" fill="none"><path d="M16 4L28 10v12L16 28 4 22V10z" stroke="#505050" stroke-width="1.5" fill="none"/></svg>
        <div class="editor-empty-title">VORTEX FLAME</div>
        <div class="editor-empty-sub">选择文件开始编辑</div>
        <div style="margin-top:4px"><kbd>Ctrl+P</kbd> 搜索 <kbd>Ctrl+S</kbd> 保存 <kbd>Ctrl+B</kbd> 面板</div>
      </div>
      <div class="editor-area" id="editorArea" style="display:none">
        <div class="editor-lines" id="editorLines"></div>
        <div class="editor-text"><textarea id="editorText" spellcheck="false" onkeydown="editorKeydown(event)" oninput="onEditorInput()" onscroll="syncScroll()" onkeyup="updateCursorPos()" onclick="updateCursorPos()"></textarea></div>
      </div>
    </div>
  </div>
  <div class="status-bar">
    <span><span class="status-dot" id="statusDot"></span><span id="statusText">---</span></span>
    <span id="statusMem">---</span>
    <span class="spacer"></span>
    <span id="statusCursor">Ln 1, Col 1</span>
    <span id="statusLang">---</span>
  </div>
</main>

<aside class="chat-panel" id="chatPanel">
  <div class="chat-header"><span>对话</span><div class="chat-header-actions"><button onclick="clearChat()">○</button><button onclick="toggleChat()">×</button></div></div>
  <div class="chat-souls" id="chatSouls"></div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-welcome">
      <svg viewBox="0 0 32 32" fill="none"><path d="M16 4L28 10v12L16 28 4 22V10z" stroke="#505050" stroke-width="1" fill="none"/></svg>
      <h3>VORTEX FLAME</h3>
      <p>14 个专业知识库，按需路由</p>
      <div class="chat-hints"><div class="chat-hint" onclick="quickAsk('审查当前文件')">审查</div><div class="chat-hint" onclick="quickAsk('解释代码')">解释</div><div class="chat-hint" onclick="quickAsk('优化性能')">优化</div><div class="chat-hint" onclick="quickAsk('写测试')">测试</div></div>
    </div>
  </div>
  <div class="chat-input-wrap">
    <textarea class="chat-input" id="chatInput" placeholder="输入问题..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
    <button class="chat-send" onclick="sendChat()">↵</button>
  </div>
</aside>
</div>

<script>

/* ── STATE ── */
let systemStatus={}, currentPage='files', activeSouls=[], openTabs=[], activeTabIdx=-1, dirtyTabs={}, chatVisible=true;

/* ── LAYOUT ── */
function switchPage(page){
  currentPage=page;
  document.querySelectorAll('.nav-item[data-page]').forEach(n=>n.classList.toggle('active',n.dataset.page===page));
  const tp=document.getElementById('treePanel'), mp=document.getElementById('mainPanel'), app=document.getElementById('app');
  if(page==='files'){
    app.className='app'+(chatVisible?'':' no-chat');
    tp.style.display='';mp.style.display='';
    document.getElementById('editorWrap').style.display='';
    document.getElementById('tabBar').style.display='';
  }else if(page==='chatfull'){
    app.className='app no-tree no-chat';tp.style.display='none';
    mp.innerHTML='<div class="page-dashboard" id="chatFullPage"></div>';renderChatFull();
  }else{
    app.className='app no-tree'+(chatVisible?'':' no-chat');tp.style.display='none';
    mp.innerHTML='<div class="page-dashboard" id="pageContent"></div>';
    if(page==='dashboard')renderDashboard();
    else if(page==='skills')renderSkills();
    else if(page==='hermes')renderHermes();
  }
}
function toggleChat(){chatVisible=!chatVisible;document.getElementById('chatPanel').style.display=chatVisible?'':'none';switchPage(currentPage)}

/* ── FILE TREE ── */
let treeRoot='.';
async function loadTree(path,el){
  path=path||'.';
  try{
    const r=await fetch('/api/files/ls?path='+encodeURIComponent(path));if(!r.ok)return;
    const d=await r.json();if(!d.is_dir)return;
    document.getElementById('treePath').textContent=d.path;
    const body=el||document.getElementById('treeBody');if(!el)body.innerHTML='';
    let h='';
    for(const e of d.entries){
      const fp=path==='.'?e.name:path+'/'+e.name;
      if(e.is_dir){
        h+='<div class="tree-row dir" data-path="'+esc(fp)+'" onclick="toggleDir(this,\''+esc(fp)+'\')">';
        h+='<span class="tree-arrow" id="ar_'+fid(fp)+'">▸</span><span class="tree-icon">▵</span><span class="tree-name">'+e.name+'</span></div>';
        h+='<div id="ch_'+fid(fp)+'" style="display:none"></div>';
      }else{
        h+='<div class="tree-row file" data-path="'+esc(fp)+'" onclick="openFile(\''+esc(fp)+'\')" style="padding-left:'+(el?24:16)+'px"><span class="tree-icon">'+fIcon(e.name)+'</span><span class="tree-name">'+e.name+'</span></div>';
      }
    }
    if(el){el.innerHTML=h}else{body.innerHTML=h}
    if(!el)refreshTree();
  }catch(e){}
}
function fid(p){return p.replace(/[^a-zA-Z0-9]/g,'_')}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function toggleDir(row,path){
  const id=fid(path), arr=document.getElementById('ar_'+id), ch=document.getElementById('ch_'+id);
  if(ch.style.display==='none'){ch.style.display='';arr.textContent='▾';if(!ch.dataset.loaded){ch.dataset.loaded='1';loadTree(path,ch)}}
  else{ch.style.display='none';arr.textContent='▸'}
}
function refreshTree(){loadTree(treeRoot)}
function fIcon(name){const e=name.split('.').pop().toLowerCase();const m={py:'¶',js:'{',ts:'t',tsx:'r',html:'⊞',css:'#',json:'[',yaml:'·',yml:'·',md:'❡',sql:'⊡',sh:'$',svg:'◇'};return m[e]||'·'}

/* ── TABS & EDITOR ── */
async function openFile(path){
  const ei=openTabs.findIndex(t=>t.path===path);
  if(ei>=0){activeTabIdx=ei;renderTabs();renderEditor();return}
  try{
    const r=await fetch('/api/files/read?path='+encodeURIComponent(path));if(!r.ok){alert('读取失败');return}
    const d=await r.json();if(d.binary){alert('二进制文件');return}
    openTabs.push({path,content:d.content,language:d.language,saved:true});activeTabIdx=openTabs.length-1;
    renderTabs();renderEditor();
  }catch(e){alert('Error: '+e.message)}
}
function closeTab(idx){
  const t=openTabs[idx];if(dirtyTabs[t.path]&&!confirm('未保存，关闭？'))return;
  openTabs.splice(idx,1);delete dirtyTabs[t.path];
  if(activeTabIdx>=openTabs.length)activeTabIdx=openTabs.length-1;
  if(!openTabs.length)activeTabIdx=-1;renderTabs();renderEditor();
}
function renderTabs(){
  document.getElementById('tabBar').innerHTML=openTabs.map((t,i)=>{
    const n=t.path.split(/[/\\]/).pop(), d=dirtyTabs[t.path]?'<span class="tab-dirty">●</span>':'';
    return '<div class="tab'+(i===activeTabIdx?' active':'')+'" onclick="activeTabIdx='+i+';renderTabs();renderEditor()">'+n+d+'<span class="tab-close" onclick="event.stopPropagation();closeTab('+i+')">×</span></div>';
  }).join('');
}
function renderEditor(){
  const e=document.getElementById('editorEmpty'),a=document.getElementById('editorArea'),ta=document.getElementById('editorText'),l=document.getElementById('statusLang');
  if(activeTabIdx<0||!openTabs.length){e.style.display='';a.style.display='none';l.textContent='---';return}
  e.style.display='none';a.style.display='';const t=openTabs[activeTabIdx];ta.value=t.content;l.textContent=t.language||'---';
  updateLines();updateCursor();
}
function updateLines(){const ta=document.getElementById('editorText'),ls=document.getElementById('editorLines'),c=(ta.value.match(/\n/g)||[]).length+1;let h='';for(let i=1;i<=c;i++)h+='<div>'+i+'</div>';ls.innerHTML=h}
function onEditorInput(){if(activeTabIdx<0)return;const t=openTabs[activeTabIdx],ta=document.getElementById('editorText');if(ta.value!==t.content)dirtyTabs[t.path]=true;else delete dirtyTabs[t.path];t.content=ta.value;updateLines();updateCursor();renderTabs()}
function editorKeydown(e){if(e.ctrlKey&&e.key==='s'){e.preventDefault();saveFile();return}if(e.key==='Tab'){e.preventDefault();const ta=document.getElementById('editorText'),s=ta.selectionStart;ta.value=ta.value.substring(0,s)+'\t'+ta.value.substring(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+1;onEditorInput()}}
async function saveFile(){if(activeTabIdx<0)return;const t=openTabs[activeTabIdx],ta=document.getElementById('editorText');try{const r=await fetch('/api/files/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:t.path,content:ta.value})});if(r.ok){delete dirtyTabs[t.path];t.saved=true;renderTabs()}}catch(e){alert('保存失败')}}
function updateCursor(){const ta=document.getElementById('editorText');if(!ta||activeTabIdx<0)return;const txt=ta.value.substring(0,ta.selectionStart),ln=(txt.match(/\n/g)||[]).length+1,nl=txt.lastIndexOf('\n');document.getElementById('statusCursor').textContent='Ln '+ln+', Col '+(ta.selectionStart-(nl>=0?nl+1:0)+1)}
function syncScroll(){const ta=document.getElementById('editorText'),ls=document.getElementById('editorLines');if(ta&&ls)ls.scrollTop=ta.scrollTop}
async function newFile(){const n=prompt('文件名:');if(!n)return;const p=treeRoot==='.'?n:treeRoot+'/'+n;try{await fetch('/api/files/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:p,content:''})});refreshTree();openFile(p)}catch(e){alert('创建失败')}}

/* ── SEARCH ── */
function openSearch(){
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML='<div class="search-dlg"><input id="searchInput" placeholder="搜索文件..." autofocus oninput="doSearch(this.value)"><div class="search-results" id="searchResults"><div class="empty-state">输入关键词</div></div></div>';
  ov.onclick=e=>{if(e.target===ov)ov.remove()};document.body.appendChild(ov);setTimeout(()=>document.getElementById('searchInput').focus(),50);
}
let st;
async function doSearch(q){clearTimeout(st);const res=document.getElementById('searchResults');if(!q){res.innerHTML='<div class="empty-state">输入关键词</div>';return}
  st=setTimeout(async()=>{res.innerHTML='<div class="empty-state">搜索中...</div>';
  try{const r=await fetch('/api/files/search?q='+encodeURIComponent(q)+'&max_results=30'),d=await r.json();if(!d.results.length){res.innerHTML='<div class="empty-state">无结果</div>';return}
    res.innerHTML=d.results.map(r=>'<div class="search-item" onclick="openSearchResult(\''+esc(r.file)+'\')"><div class="sf">'+esc(r.file)+' <span class="sm">:'+r.line+'</span></div><div class="sl">'+esc(r.content)+'</div></div>').join('')}catch(e){res.innerHTML='<div class="empty-state">搜索失败</div>'}},300)}
async function openSearchResult(file){document.querySelector('.overlay')?.remove();await openFile(treeRoot==='.'?file:treeRoot+'/'+file)}

/* ── CHAT ── */
function renderChatSouls(){document.getElementById('chatSouls').innerHTML=SOULS.map(s=>'<div class="chat-soul-tag'+(activeSouls.includes(s.id)?' active':'')+'" onclick="toggleSoul(\''+s.id+'\')">'+soulSVG(s.icon)+' '+s.name+'</div>').join('')}
function toggleSoul(id){const i=activeSouls.indexOf(id);if(i>=0)activeSouls.splice(i,1);else activeSouls.push(id);renderChatSouls()}
async function sendChat(){
  const input=document.getElementById('chatInput'),q=input.value.trim();if(!q)return;input.value='';input.style.height='auto';
  const msgs=document.getElementById('chatMessages'),w=msgs.querySelector('.chat-welcome');if(w)w.remove();
  let sq=q,souls=[...activeSouls];const m=q.match(/^@(\w+)\s+(.*)/);if(m){souls=[m[1]];sq=m[2]}
  msgs.innerHTML+=cMsg('user',sq);msgs.innerHTML+=cMsg('soul','<div class="loading-dots"><span></span><span></span><span></span></div>',souls[0]||'思考中');
  msgs.scrollTop=msgs.scrollHeight;
  try{
    let ctx='';if(activeTabIdx>=0){const t=openTabs[activeTabIdx];ctx='\n[文件: '+t.path+']\n```\n'+document.getElementById('editorText').value.substring(0,3000)+'\n```'}
    let r, body;
    if(souls.length>1){
      body=JSON.stringify({query:sq+ctx, kbs:souls, mode:'manual', top_k:3});
      r=await fetch('/api/orchestrate',{method:'POST',headers:{'Content-Type':'application/json'},body});
    }else{
      body=JSON.stringify({query:sq+ctx, soul:souls[0]||null, top_k:2});
      r=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body});
    }
    msgs.querySelectorAll('.loading-dots').forEach(l=>l.closest('.chat-msg')?.remove());
    if(r.ok){const d=await r.json();const results=d.results||d.orchestrated_kbs||[];for(const resp of results)msgs.innerHTML+=cMsg('soul',resp.output||resp.content||resp.summary||'',resp.soul||resp.name,resp.confidence)}
    else msgs.innerHTML+=cMsg('soul','引擎暂不可用','系统');
  }catch(e){msgs.querySelectorAll('.loading-dots').forEach(l=>l.closest('.chat-msg')?.remove());msgs.innerHTML+=cMsg('soul','无法连接后端','系统')}
  msgs.scrollTop=msgs.scrollHeight;
}
function quickAsk(p){document.getElementById('chatInput').value=p;sendChat()}
function cMsg(role,text,soulId,conf){
  if(role==='user')return '<div class="chat-msg user"><div class="bubble">'+esc(text)+'</div></div>';
  const s=SOULS.find(x=>x.id===soulId)||{},n=s.name||soulId||'VORTEX',cs=conf?' <span style="font-size:8px;opacity:.35">'+Math.round(conf*100)+'%</span>':'';
  return '<div class="chat-msg soul"><div class="chat-msg-avatar">'+(soulId?soulSVG(s.icon):'<svg viewBox="0 0 16 16" fill="none"><path d="M8 2l6 3v6l-6 3-6-3V5z" stroke="#808080" stroke-width="1" fill="none"/></svg>')+'</div><div class="chat-msg-body"><div class="chat-msg-name">'+n+cs+'</div><div class="chat-msg-text">'+esc(text)+'</div></div></div>';
}
function clearChat(){document.getElementById('chatMessages').innerHTML='<div class="chat-welcome"><svg viewBox="0 0 32 32" fill="none"><path d="M16 4L28 10v12L16 28 4 22V10z" stroke="#505050" stroke-width="1" fill="none"/></svg><h3>已清空</h3><p>开始新的对话</p></div>'}

/* ── CHAT FULL ── */
function renderChatFull(){
  const pc=document.getElementById('chatFullPage');if(!pc)return;
  pc.innerHTML='<div style="display:flex;flex-direction:column;height:100%"><div style="display:flex;gap:3px;padding:8px 0;flex-wrap:wrap">'+SOULS.map(s=>'<div class="chat-soul-tag'+(activeSouls.includes(s.id)?' active':'')+'" onclick="toggleSoul(\''+s.id+'\');renderChatFull()">'+soulSVG(s.icon)+' '+s.name+'</div>').join('')+'</div><div id="chatFullMsgs" style="flex:1;overflow-y:auto;padding:8px 0"><div class="chat-welcome"><svg viewBox="0 0 32 32" fill="none"><path d="M16 4L28 10v12L16 28 4 22V10z" stroke="#505050" stroke-width="1" fill="none"/></svg><h3>全屏对话</h3><p>选择多个知识库协同回答</p></div></div><div style="display:flex;gap:5px;padding-top:8px;border-top:1px solid var(--c3)"><textarea id="chatFullInput" class="chat-input" placeholder="输入问题..." rows="1" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendChatFull()}" style="min-height:38px"></textarea><button class="chat-send" onclick="sendChatFull()" style="height:38px;width:38px">↵</button></div></div>';
}
async function sendChatFull(){
  const input=document.getElementById('chatFullInput'),msgs=document.getElementById('chatFullMsgs');if(!input||!msgs)return;
  const q=input.value.trim();if(!q)return;input.value='';const w=msgs.querySelector('.chat-welcome');if(w)w.remove();
  const kbs=activeSouls.slice();msgs.innerHTML+=cMsg('user',q);msgs.innerHTML+=cMsg('soul','<div class="loading-dots"><span></span><span></span><span></span></div>',kbs.length?kbs.join('+'):'自动路由');msgs.scrollTop=msgs.scrollHeight;
  try{
    let body,r;
    if(kbs.length>1){body={query:q,kbs:kbs,mode:'manual',top_k:3};r=await fetch('/api/orchestrate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})}
    else{r=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,soul:kbs[0]||null,top_k:2})})}
    msgs.querySelectorAll('.loading-dots').forEach(l=>l.closest('.chat-msg')?.remove());
    if(r.ok){const d=await r.json();const results=d.results||[];if(results.length)for(const resp of results)msgs.innerHTML+=cMsg('soul',resp.output||resp.content||resp.summary||'',resp.soul||resp.name,resp.confidence);else msgs.innerHTML+=cMsg('soul',d.summary||'','多KB',null)}

  }catch(e){msgs.querySelectorAll('.loading-dots').forEach(l=>l.closest('.chat-msg')?.remove());msgs.innerHTML+=cMsg('soul','无法连接','系统')}
  msgs.scrollTop=msgs.scrollHeight;

      '<div class="stat-card"><div class="stat-label">知识库</div><div class="stat-value" style="color:var(--t1)">14</div><div class="stat-sub">/ 14 活跃</div></div>'+
      '<div class="stat-card"><div class="stat-label">条目</div><div class="stat-value" style="color:var(--t1)">'+(tm/1000).toFixed(0)+'k</div><div class="stat-sub">100% 向量化</div></div>'+
      '<div class="stat-card"><div class="stat-label">引擎</div><div class="stat-value" style="color:'+(ok?'var(--ok)':'var(--err)')+'">'+(ok?'在线':'离线')+'</div><div class="stat-sub">'+model+'</div></div>'+
      '<div class="stat-card"><div class="stat-label">C-JEPA</div><div class="stat-value" style="color:var(--warn)">1/10</div><div class="stat-sub">训练中</div></div>'+
    '</div>'+
    '<div class="dash-section"><div class="dash-section-title">知识库</div>'+
      SOULS.map(s=>{const mem=((systemStatus.souls||{})[s.id]||{}).memories||0,pct=Math.min(1,mem/25000);return '<div class="bar-row"><span class="bar-label">'+soulSVG(s.icon)+' '+s.name+'</span><div class="bar-track"><div class="bar-fill" style="width:'+(pct*100)+'%;background:var(--acc);opacity:'+(.2+pct*.6)+'"></div></div><span class="bar-val">'+(mem/1000).toFixed(1)+'k</span></div>'}).join('')+
    '</div>';
}

/* ── SKILLS ── */
function renderSkills(){
  const pc=document.getElementById('pageContent');if(!pc)return;
  const skills=[{n:'工程',d:'审查、架构、调试',t:['系统']},{n:'金融',d:'风险、优化',t:['量化']},{n:'研究',d:'文献、实验',t:['学术']},{n:'医疗',d:'诊断、临床',t:['医学']},{n:'法律',d:'合同、合规',t:['法规']},{n:'设计',d:'模式、色彩',t:['UX']},{n:'数据',d:'ETL、质量',t:['工程']},{n:'运维',d:'CI/CD、监控',t:['DevOps']}];
  pc.innerHTML='<h3 style="margin-bottom:10px;color:var(--t1);font-weight:400">技能</h3><div class="skill-grid">'+skills.map(s=>'<div class="skill-card"><div class="skill-name">'+s.n+'</div><div class="skill-desc">'+s.d+'</div><div class="skill-tags">'+s.t.map(t=>'<span class="skill-tag">'+t+'</span>').join('')+'</div></div>').join('')+'</div>';
}

/* ── HERMES ── */
function renderHermes(){
  const pc=document.getElementById('pageContent');if(!pc)return;
  const ok=systemStatus.ollama?.connected,model=systemStatus.ollama?.model||'---';
  pc.innerHTML=
    '<div class="hermes-card"><h3 style="color:var(--t1);font-weight:400;margin-bottom:6px">模型</h3>'+
      '<div class="hermes-model-row"><div class="hermes-model-icon" style="background:'+(ok?'rgba(102,187,136,.1)':'rgba(204,102,102,.1)')+';color:'+(ok?'var(--ok)':'var(--err)')+'">'+(ok?'✓':'✗')+'</div><div class="hermes-model-name">Ollama</div><div class="hermes-model-tag '+(ok?'tag-ok':'tag-warn')+'">'+(ok?'在线':'离线')+'</div></div>'+
      '<div class="hermes-model-row"><div class="hermes-model-icon" style="background:rgba(136,170,204,.08);color:#8ac">M</div><div class="hermes-model-name">当前模型</div><div class="hermes-model-tag tag-info">'+model+'</div></div>'+
    '</div>'+
    '<div class="hermes-card"><h3 style="color:var(--t1);font-weight:400;margin-bottom:6px">VORTEX vs 爱马仕</h3>'+
      '<div style="font-size:11px;line-height:2;color:var(--t2)">14 知识库 · 语义路由 · 多专家 · JEPA 世界模型 · 持久记忆 · 技能进化</div>'+
    '</div>'+
    '<div class="hermes-card"><h3 style="color:var(--t1);font-weight:400;margin-bottom:6px">知识库映射</h3>'+
      SOULS.map(s=>{const mapped=(systemStatus.hermes?.soul_model_map||{})[s.id]||'---';return '<div class="bar-row"><span class="bar-label">'+soulSVG(s.icon)+' '+s.name+'</span><span style="font-family:var(--ffm);font-size:10px;color:#8ac">'+mapped+'</span></div>'}).join('')+
    '</div>';
}

/* ── STATUS ── */
async function fetchStatus(){
  try{const r=await fetch('/api/status');if(r.ok)systemStatus=await r.json();const ok=systemStatus.ollama?.connected;document.getElementById('statusDot').className='status-dot '+(ok?'ok':'err');document.getElementById('statusText').textContent=ok?'在线':'离线';const tm=Object.values(systemStatus.souls||{}).reduce((a,s)=>a+(s.memories||0),0);document.getElementById('statusMem').textContent=(tm/1000).toFixed(0)+'k 条目'}catch(e){}
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='p'){e.preventDefault();openSearch()}if(e.ctrlKey&&e.key==='b'){e.preventDefault();toggleChat()}});

/* ── INIT ── */
renderChatSouls();fetchStatus();setInterval(fetchStatus,15000);loadTree();
</script>
